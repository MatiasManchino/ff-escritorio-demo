<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Freight Forwarder — El Escritorio</title>
<style>
  /* ═══════════════════════════════════════════════════════════
     FREIGHT FORWARDER v4 — El Escritorio (Rediseño 2026)
     Swipe navigation · Hub central · Estilo premium oscuro
     ═══════════════════════════════════════════════════════════ */
  :root{
    --bg:#070b14;
    --bg-gradient:radial-gradient(ellipse 140% 100% at 50% 0%,#0f1f3a 0%,#070b14 55%);
    --panel:#0e1624;
    --panel2:#141e32;
    --panel3:#1a2640;
    --line:#253554;
    --line2:#2d4466;
    --txt:#e8eef6;
    --txt2:#c4d0e0;
    --muted:#7a8fa8;
    --muted2:#556680;
    --accent:#f4845f;
    --accent2:#ff9e7d;
    --good:#4ade80;
    --good-bg:rgba(74,222,128,0.08);
    --bad:#f87171;
    --bad-bg:rgba(248,113,113,0.08);
    --warn:#fbbf24;
    --warn-bg:rgba(251,191,36,0.08);
    --info:#60a5fa;
    --info-bg:rgba(96,165,250,0.08);
    --violet:#a78bfa;
    --violet-bg:rgba(167,139,250,0.08);
    --hub:#38bdf8;
    --shadow:0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg:0 8px 40px rgba(0,0,0,0.5);
    --radius:16px;
    --radius-sm:12px;
    --radius-xs:8px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}

  html,body{
    width:100%;height:100%;overflow:hidden;
    background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
    font-size:15px;line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }

  body{background:var(--bg-gradient)}

  /* ===== VIEWPORT & SWIPE CONTAINER ===== */
  .app{
    width:100%;height:100%;display:flex;flex-direction:column;
    position:relative;overflow:hidden;
  }

  .panels-container{
    flex:1;display:flex;width:300%;height:100%;
    transform: translateX(calc(var(--ap,1) * -33.333%));   /* posición según panel activo (mobile) */
    transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
    will-change:transform;
    touch-action:pan-y;
  }
  .panels-container.dragging{transition:none}

  .panel{
    width:33.333%;height:100%;overflow-y:auto;overflow-x:hidden;
    padding:0 14px 190px;position:relative;   /* colchón abajo para que la barra de navegación no tape los botones */
    scrollbar-width:none;
  }
  .panel::-webkit-scrollbar{display:none}

  /* ===== HUD ===== */
  .hud{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(7,11,20,0.88);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line);padding:8px 12px 6px;
    display:flex;gap:6px;align-items:center;
    overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  }
  .hud-spacer{height:62px;flex-shrink:0}

  .hud-cell{
    flex:1 0 120px;text-align:center;padding:5px 2px;border-radius:var(--radius-xs);
    background:var(--panel);border:1px solid var(--line);
    min-width:120px;position:relative;
  }
  .hud-cell.alert{background:var(--bad-bg);border-color:rgba(248,113,113,0.3)}
  .hud-cell.click{cursor:pointer;transition:transform .12s}
  .hud-cell.click:active{transform:scale(0.96)}
  .hud-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;font-weight:600;white-space:normal;line-height:1.3;word-break:break-word}
  .hud-val{font-size:14px;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hud-badge{
    position:absolute;top:-4px;right:3px;background:var(--bad);color:#fff;
    font-size:8px;font-weight:700;border-radius:6px;padding:1px 4px;min-width:14px;
  }

  /* ===== NAV DOTS ===== */
  .nav-dots{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:rgba(7,11,20,0.88);backdrop-filter:blur(16px);
    border-top:1px solid var(--line);padding:10px 0 14px;
    display:flex;justify-content:center;align-items:center;gap:20px;
  }
  .nav-dot{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;opacity:0.45;transition:opacity 0.2s;
    user-select:none;-webkit-user-select:none;
  }
  .nav-dot.active{opacity:1}
  .nav-dot .dot-circle{
    width:10px;height:10px;border-radius:50%;background:var(--muted2);
    transition:all 0.25s cubic-bezier(0.32,0.72,0,1);
    position:relative;
  }
  .nav-dot.active .dot-circle{background:var(--accent);transform:scale(1.3)}
  .nav-dot .dot-label{
    font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);
  }
  .nav-dot.active .dot-label{color:var(--txt)}
  .nav-dot[data-panel="0"].active .dot-circle{background:var(--violet)}
  .nav-dot[data-panel="0"].active .dot-label{color:var(--violet)}
  .nav-dot[data-panel="1"].active .dot-circle{background:var(--hub)}
  .nav-dot[data-panel="1"].active .dot-label{color:var(--hub)}
  .nav-dot[data-panel="2"].active .dot-circle{background:var(--accent)}
  .nav-dot[data-panel="2"].active .dot-label{color:var(--accent2)}

  /* ===== CARDS ===== */
  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:18px;margin-bottom:12px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
    animation:cardIn 0.28s ease-out;
  }
  @keyframes cardIn{
    from{opacity:0;transform:translateY(16px) scale(0.98)}
    to{opacity:1;transform:none}
  }
  .card-header{
    display:flex;align-items:center;gap:12px;margin-bottom:14px;
  }
  .card-icon{
    width:44px;height:44px;border-radius:var(--radius-sm);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;flex-shrink:0;background:var(--panel3);
  }
  .card-title{font-size:16px;font-weight:800;letter-spacing:-0.3px}
  .card-subtitle{font-size:12px;color:var(--muted);margin-top:1px}

  /* ===== STATUS BADGES ===== */
  .badge{
    display:inline-flex;align-items:center;gap:4px;
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;
    padding:3px 8px;border-radius:20px;white-space:nowrap;
  }
  .badge-good{background:var(--good-bg);color:var(--good);border:1px solid rgba(74,222,128,0.2)}
  .badge-warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(251,191,36,0.2)}
  .badge-bad{background:var(--bad-bg);color:var(--bad);border:1px solid rgba(248,113,113,0.2)}
  .badge-info{background:var(--info-bg);color:var(--info);border:1px solid rgba(96,165,250,0.2)}
  .badge-violet{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(167,139,250,0.2)}

  /* ===== SECTION LABELS ===== */
  .section-lbl{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);margin:16px 0 8px;padding-left:2px;
  }

  /* ===== INFO ROWS ===== */
  .info-row{
    display:flex;align-items:center;gap:12px;padding:10px 0;
    border-bottom:1px solid rgba(37,53,84,0.5);
  }
  .info-row:last-child{border-bottom:none}
  .info-icon{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;background:var(--panel2);flex-shrink:0;
  }
  .info-content{flex:1;min-width:0}
  .info-label{font-size:11px;color:var(--muted);font-weight:500}
  .info-value{font-size:14px;font-weight:600;color:var(--txt);margin-top:1px}
  .info-right{text-align:right;flex-shrink:0}

  /* ===== QUOTE CARD ===== */
  .quote-card{
    background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:16px;margin:10px 0;
    position:relative;overflow:hidden;
  }
  .quote-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:var(--accent);
  }
  .range-wrap{margin:10px 0}
  input[type=range]{
    width:100%;height:8px;border-radius:4px;
    -webkit-appearance:none;appearance:none;
    background:var(--panel3);outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:var(--accent);border:3px solid var(--panel2);
    box-shadow:0 2px 8px rgba(244,132,95,0.4);cursor:pointer;
    transition:transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:active{transform:scale(1.2)}
  input[type=range]::-moz-range-thumb{
    width:22px;height:22px;border-radius:50%;
    background:var(--accent);border:3px solid var(--panel2);
    box-shadow:0 2px 8px rgba(244,132,95,0.4);cursor:pointer;
  }

  /* ===== BUTTONS ===== */
  .btn-row{display:flex;gap:10px;margin-top:14px}
  .btn{
    flex:1;border:none;border-radius:var(--radius-sm);padding:14px 8px;
    font-size:14px;font-weight:700;cursor:pointer;text-align:center;
    transition:all 0.15s;user-select:none;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn:active{transform:scale(0.97)}
  .btn-primary{background:var(--accent);color:#1a0f08}
  .btn-primary:hover{background:var(--accent2)}
  .btn-success{background:var(--good);color:#0a1f0f}
  .btn-danger{background:rgba(248,113,113,0.15);color:var(--bad);border:1px solid rgba(248,113,113,0.25)}
  .btn-ghost{background:var(--panel3);color:var(--txt2);border:1px solid var(--line)}
  .btn-violet{background:var(--violet);color:#140b2e}
  .btn-warn{background:var(--warn);color:#2a1f08}
  .btn:disabled{opacity:0.35;cursor:default;transform:none}

  /* ===== SEGMENTED CONTROL ===== */
  .seg{display:flex;gap:4px;background:var(--panel3);padding:4px;border-radius:var(--radius-xs)}
  .seg-btn{
    flex:1;border:none;border-radius:8px;padding:10px 4px;
    font-size:12px;font-weight:600;color:var(--muted);
    background:transparent;cursor:pointer;text-align:center;
    transition:all 0.15s;
  }
  .seg-btn.on{background:var(--accent);color:#1a0f08;font-weight:700}
  .seg-btn .seg-sub{display:block;font-size:9px;color:inherit;opacity:0.6;margin-top:1px}

  /* ===== TACTIC BUTTONS ===== */
  .tactics{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap}
  .tactic{
    flex:1;min-width:80px;border:1px solid var(--line);border-radius:var(--radius-xs);
    padding:10px 8px;font-size:12px;font-weight:600;color:var(--txt2);
    background:var(--panel2);cursor:pointer;text-align:center;
    transition:all 0.15s;
  }
  .tactic:active{transform:scale(0.96)}
  .tactic:disabled{opacity:0.3;cursor:default;transform:none}
  .tactic.used{opacity:0.35;text-decoration:line-through}

  /* ===== AGENT CARDS ===== */
  .agent-card{
    background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;
    position:relative;transition:border-color 0.2s;
  }
  .agent-card.selected{border-color:var(--violet);box-shadow:0 0 0 1px var(--violet)}
  .agent-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .agent-avatar{
    width:40px;height:40px;border-radius:var(--radius-xs);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;background:var(--panel3);flex-shrink:0;
  }
  .agent-name{font-weight:700;font-size:15px}
  .agent-type{font-size:11px;color:var(--muted)}
  .agent-rel{margin-left:auto;text-align:right}
  .rel-bar{
    height:4px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:4px;width:60px;margin-left:auto;
  }
  .rel-bar>i{display:block;height:100%;border-radius:4px;transition:width 0.3s}
  .rel-bar>i.good{background:var(--good)}
  .rel-bar>i.mid{background:var(--warn)}
  .rel-bar>i.bad{background:var(--bad)}

  .agent-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .agent-stat{font-size:11px;color:var(--muted)}
  .agent-stat b{color:var(--txt);font-weight:600}
  .agent-price-row{display:flex;align-items:center;justify-content:space-between}
  .agent-price{font-size:22px;font-weight:800;color:var(--violet)}
  .agent-savings{font-size:11px;color:var(--good);font-weight:600}
  .agent-loss{font-size:11px;color:var(--bad);font-weight:600}

  /* ===== MESSAGES / STORY ===== */
  .story{
    background:var(--panel2);border-left:3px solid var(--accent);
    border-radius:0 var(--radius-xs) var(--radius-xs) 0;
    padding:12px 14px;font-size:13.5px;font-style:italic;
    color:var(--txt2);line-height:1.5;margin:10px 0;
  }
  .story.violet{border-color:var(--violet)}
  .story.good{border-color:var(--good)}
  .story.bad{border-color:var(--bad)}
  .story.warn{border-color:var(--warn)}

  .motiv{font-size:12px;color:var(--warn);margin-top:6px;font-style:normal;font-weight:500}
  .motiv::before{content:"🎯 "}

  .note{
    display:flex;gap:8px;align-items:flex-start;
    background:var(--panel2);border-radius:var(--radius-xs);
    padding:10px 12px;margin:8px 0;font-size:12px;color:var(--muted);
  }
  .note .note-icon{flex-shrink:0;font-size:14px;margin-top:1px}

  /* ===== DUAL STAT BOXES ===== */
  .duo{display:flex;gap:8px;margin:10px 0}
  .duo-box{
    flex:1;background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-xs);padding:12px;text-align:center;
  }
  .duo-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
  .duo-value{font-size:20px;font-weight:800;margin-top:3px}

  /* ===== SUMMARY ROW ===== */
  .summary{
    display:flex;align-items:center;justify-content:space-around;gap:4px;
    background:var(--panel2);border-radius:var(--radius-sm);padding:14px 10px;
    margin:10px 0;text-align:center;
  }
  .summary-col{flex:1}
  .summary-label{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
  .summary-value{font-size:26px;font-weight:800;display:block;margin-top:2px;line-height:1.1}
  .summary-op{font-size:14px;color:var(--muted);font-weight:300}

  /* ===== LOG ===== */
  /* Notificaciones tipo "toast": esquina inferior izquierda, angostas,
     NO bloquean los clics (pointer-events:none) y se desvanecen solas. */
  .log{
    position:fixed;bottom:66px;left:10px;z-index:90;
    width:min(66%,250px);font-size:11px;
    display:flex;flex-direction:column;justify-content:flex-end;
    pointer-events:none;background:none;border:none;padding:0;
  }
  .log div{
    background:rgba(7,11,20,0.92);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:var(--radius-xs);
    padding:6px 9px;margin-top:5px;color:var(--txt2);
    box-shadow:var(--shadow);animation:toastIn .25s ease;
  }
  @keyframes toastIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
  @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-14px)}}

  /* ===== OPS LIST ===== */
  .ops-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 0;border-bottom:1px solid rgba(37,53,84,0.4);
  }
  .ops-row:last-child{border-bottom:none}
  .ops-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .ops-co{flex:1;min-width:0}
  .ops-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ops-sub{font-size:10px;color:var(--muted)}
  .ops-amt{text-align:right;flex-shrink:0}
  .ops-amt-val{font-weight:700;font-size:13px}
  .ops-amt-when{font-size:10px;color:var(--muted)}

  /* ===== CENTERED STATES ===== */
  .center{text-align:center}
  .big{font-size:26px;font-weight:800;margin:6px 0;letter-spacing:-0.5px}
  .tip{color:var(--muted);font-size:12px;margin-top:8px;line-height:1.5}

  /* ===== HUB PANEL ===== */
  .hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
  .hub-card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:16px 10px;text-align:center;
    cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;
  }
  .hub-card:active{transform:scale(0.97)}
  .hub-card .hub-emoji{font-size:28px;margin-bottom:6px;display:block}
  .hub-card .hub-title{font-size:13px;font-weight:700;margin-bottom:2px}
  .hub-card .hub-desc{font-size:10px;color:var(--muted);line-height:1.3}
  .hub-card .hub-badge{
    position:absolute;top:6px;right:6px;background:var(--bad);
    color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 6px;
  }
  .hub-card .hub-badge.good{background:var(--good);color:#0a1f0f}
  .hub-card .hub-badge.info{background:var(--info)}
  .hub-card .hub-badge.violet{background:var(--violet)}

  .hub-action{
    display:flex;align-items:center;gap:12px;
    background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;
    cursor:pointer;transition:all 0.15s;
  }
  .hub-action:active{transform:scale(0.98)}
  .hub-action .ha-icon{font-size:24px;flex-shrink:0}
  .hub-action .ha-content{flex:1}
  .hub-action .ha-title{font-weight:700;font-size:14px}
  .hub-action .ha-desc{font-size:11px;color:var(--muted);margin-top:1px}
  .hub-action .ha-arrow{font-size:14px;color:var(--muted);flex-shrink:0}

  .pulse{animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}

  /* ===== SWIPE HINT ===== */
  .swipe-hint{
    text-align:center;font-size:10px;color:var(--muted2);
    padding:4px 0 2px;letter-spacing:0.3px;
  }

  /* ===== MODALS ===== */
  .modal{
    position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;
    display:flex;align-items:center;justify-content:center;padding:16px;
    overflow-y:auto;animation:fadeIn 0.2s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal-box{
    background:var(--panel);border:1px solid var(--line2);
    border-radius:var(--radius);max-width:480px;width:100%;
    max-height:85vh;overflow-y:auto;padding:22px;
    box-shadow:var(--shadow-lg);animation:slideUp 0.25s ease;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
  .modal-title{color:var(--accent);font-size:18px;font-weight:800;margin-bottom:8px}
  .modal-sub{color:var(--info);font-size:14px;font-weight:700;margin:14px 0 6px}
  .modal-close{
    background:var(--accent);color:#1a0f08;border:none;border-radius:var(--radius-sm);
    padding:13px;font-weight:700;cursor:pointer;width:100%;margin-top:14px;font-size:14px;
  }
  .modal-close.ghost{background:var(--panel3);color:var(--txt2);margin-top:8px}

  .rating{display:flex;gap:10px;justify-content:center;margin:12px 0}
  .star{cursor:pointer;font-size:30px;color:var(--muted2);transition:color 0.15s}
  .star.on{color:var(--warn)}
  .fb-input{
    width:100%;background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-xs);padding:10px 12px;color:var(--txt);
    font-family:inherit;font-size:14px;margin:6px 0;
  }
  .fb-input:focus{outline:none;border-color:var(--accent)}

  /* ===== SCORES ===== */
  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
  .score-cell{
    background:var(--panel2);border-radius:var(--radius-xs);
    padding:10px;text-align:center;
  }
  .score-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
  .score-value{font-size:18px;font-weight:800;margin-top:2px}

  /* ===== ANIMATIONS ===== */
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
  .shake{animation:shake 0.3s ease}

  /* ===== INTRO ===== */
  /* Banner de objetivo: bien vistoso, con contraste y movimiento */
  .goal-banner{
    position:relative;overflow:hidden;text-align:center;

const $=id=>document.getElementById(id);
const clamp=(n,min,max)=>Math.max(min,Math.min(max,n));

const CURR="₦";
// Mostramos los montos un dígito más chico (÷10) y sin decimales. La economía interna
// sigue igual; esto es solo cómo se ve (ej. interno 5199 → en pantalla ₦520).
const money=n=>CURR+Math.round(n/10).toLocaleString("es-AR");

// ═══════════════════════════════════════════════════════════════════════
//  ANALYTICS — tracking de comportamiento (se manda a tu Google Sheet)
//  Captura: sesión, tiempo, cada acción del juego y cada click, en orden.

// ═══════════════════════════════════════════════════════════════════════
const ANALYTICS_URL='https://script.google.com/macros/s/AKfycbwzbroCokgpRllaM_z6JLsAZvB5R5s2d-nIO_D8SbreGnKcCmwXUX2uLQivtlp954ac/exec';
const API_KEY='ff2026';   // clave compartida: el Apps Script descarta POSTs sin ella (frena bots casuales)
const SESSION_ID = (Date.now().toString(36)+Math.random().toString(36).slice(2,7)).toUpperCase();
const SESSION_START = Date.now();
let _evBuffer=[], _evSeq=0, _lastEventAt=SESSION_START;

// Registra un evento. type = nombre del evento; data = objeto con parámetros.
function track(type, data){
  const now=Date.now();
  _evBuffer.push({
    kind:"event",
    sid:SESSION_ID,
    seq:++_evSeq,
    t:type,
    sinceStart: Math.round((now-SESSION_START)/1000),   // segundos desde que abrió
    sincePrev:  Math.round((now-_lastEventAt)/1000),     // segundos desde la acción anterior
    panel: typeof activePanel!=="undefined"?["agentes","escritorio","clientes"][activePanel]:"",
    day:   (typeof G!=="undefined"&&G)?G.day:0,
    cash:  (typeof G!=="undefined"&&G)?Math.round(G.cash):0,
    rep:   (typeof G!=="undefined"&&G)?G.rep:0,
    data:  data?JSON.stringify(data):"",
    ts:    new Date().toISOString()
  });
  _lastEventAt=now;
  if(_evBuffer.length>=15) flushEvents();
}
// Manda el lote acumulado a la planilla. useBeacon=true al cerrar (no bloquea).
function flushEvents(useBeacon){
  if(!_evBuffer.length) return;
  const payload=JSON.stringify({k:API_KEY, kind:"analytics", sid:SESSION_ID, events:_evBuffer});
  _evBuffer=[];
  try{
    if(useBeacon && navigator.sendBeacon){
      navigator.sendBeacon(ANALYTICS_URL, payload);
    }else{
      fetch(ANALYTICS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:payload});
    }
  }catch(e){}
}
setInterval(()=>flushEvents(), 20000);                       // envío periódico
// al cerrar/minimizar la pestaña: mandar lo que quede + marcar fin de sesión
window.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden'){ track('session_pause',{}); flushEvents(true); }});
window.addEventListener('pagehide',()=>{ track('session_end',{durSeg:Math.round((Date.now()-SESSION_START)/1000)}); flushEvents(true); });

// Captura AUTOMÁTICA de clicks: cualquier botón/control que toques queda registrado

document.addEventListener('click',e=>{

  if(!el) return;
  const txt=(el.textContent||"").replace(/\s+/g," ").trim().slice(0,40);
  track('click',{el:txt, cls:el.className.split(' ')[0]});
}, true);

function newClient(){
  G.hagglePend=false;   // nueva carga: arranca sin regateo pendiente
  G.clientNum=(G.clientNum||0)+1;
  // RAMPA DE DIFICULTAD: los primeros 5 clientes son sencillos (NO Ahorrador, mercado
  // tranquilo, techo comercial holgado, nunca imposibles) para que el novato gane un par
  // y entienda el loop. Del 6to en adelante, dificultad completa (entran Ahorradores, etc.).
  const easy = G.clientNum<=5;
  const persona = easy
    ? pick([PERSONAS.apurado, PERSONAS.confiable])   // los amistosos, sin Ahorrador
    : pick(Object.values(PERSONAS));
  const base=pick(CARGOS);
  const scale=1+G.rep/200;   // rep 0 → x1.0 ; +100 → x1.5 ; -100 → x0.5 (escala nueva -100..100)
  let marketBase=Math.round(base.base*scale*rnd(0.9,1.15));
  let market="normal",flavor="";
  const r=Math.random();
  if(easy){
    // Mercado normal o en baja (nunca "cara"): tarifas amigables al arrancar.
    if(r<0.35){market="barata";marketBase=Math.round(marketBase*0.80);flavor="🟢 Mercado en baja: vas a conseguir tarifas buenas con los agentes.";}
  } else {
    if(r<0.18){market="barata";marketBase=Math.round(marketBase*0.80);flavor="🟢 Mercado en baja: vas a conseguir tarifas buenas con los agentes.";}
    else if(r<0.40){market="cara";marketBase=Math.round(marketBase*1.26);flavor="🔴 Temporada alta: las tarifas estan caras en todos los agentes.";}
  }
  // Techo comercial del cliente (a más de esto, no le cierra el negocio).
  // Lo mantenemos cómodo para que la mayoría sea cerrable; solo a veces es imposible (hay que pasar).
  let viableMult = easy ? rnd(1.40,1.65)
                        : (market==="cara"?rnd(1.18,1.38):rnd(1.25,1.60));
  if(!easy && Math.random()<0.08) viableMult=rnd(1.05,1.12);   // 8%: clientes a los que conviene pasar (solo en dificultad plena)

  G.st={
    persona,
    cargo:{...base, marketBase, market, viableMult,
      costo:null, agentId:null, conf:null, transit:null,
      agentTerm:G.supplierTerm, prioridad:false,
      // #3: el precio inicial NO arranca siempre en el mismo margen. Varía por operación
      // (a veces queda alto y no cierra, a veces bajo y dejás plata). Obliga a mirar las palancas.
      startMarkup: easy ? rnd(1.12,1.25) : rnd(1.12,1.45),
      clientMaxViable:null, unwinnable:false},
    flavor, price:null, term:persona.prefTerm===0?0:30,
    transport:base.modo, round:0, anger:0,
    satisfaction:Math.max(15,Math.min(85,50+Math.round(G.rep*0.3))),   // rep 0 → 50 (escala -100..100)
    revealed:[], tactics:{tiempo:false,valor:false,anticipo:false},
    tacticBonus:0, counter:null, counterTerm:null,
    clientMsg:base.historia, finished:false, targetAsked:false, targetKnown:null
  };
  buildOffers();
  track('new_client',{empresa:base.co, modo:base.modo, urgente:base.urgente, mercado:market, persona:persona.key});
}

function buildOffers(){
  const c=G.st.cargo;
  const elegibles=AGENTES.filter(a=>a.modo===c.modo);
  const roster=elegibles.length?elegibles:AGENTES.filter(a=>a.modo==="maritimo");
  G.st.offers=roster.slice(0,3).map(a=>{
    const rel=G.rel[a.id]??50;
    const relMod=1+(60-rel)/300;
    const price=Math.round(c.marketBase*a.markup*relMod*rnd(0.97,1.04));
    return {agentId:a.id, price, floor:Math.round(c.marketBase*(a.markup-a.flex*2)),
            transit:a.transit+Math.round(rnd(-2,3)), validez:a.validez, conf:a.conf};
  });
}

function acceptance(){
  const st=G.st,p=st.persona,costo=st.cargo.costo;
  if(!costo)return 0;
  // El "precio justo" del cliente nunca puede quedar por debajo de tu piso del 10%:
  // así, ofrecer el mínimo SIEMPRE da una chance decente (nunca imposible por diseño).
  const target=Math.max(costo*1.10, costo*p.targetMult);
  if(st.price>st.cargo.clientMaxViable) return 0.02;
  let acc=0.42;                                    // base más alta: un trato razonable cierra seguido
  if(st.price<=target) acc+=0.35*(1-st.price/target+0.15);   // bonus extra si estás en/bajo el precio justo
  else acc-=(p.priceSens/100)*Math.min((st.price-target)/target,0.5)*0.95;   // castigo por caro, más suave
  acc+=(st.term/60)*0.10;
  acc-=Math.abs(st.term-p.prefTerm)/60*0.10;
  if(st.cargo.modo==="aereo") acc+=p.urgency>60?0.16:-0.06;
  if(st.cargo.prioridad && p.urgency>60) acc+=0.10;
  acc+=(st.satisfaction/100)*0.12;
  acc-=st.anger*0.04;
  acc+=st.tacticBonus;
  return clamp01(acc);
}

function estimateRisk(st){
  const m=(st.price-st.cargo.costo)/st.cargo.costo;
  let ops=0.06;
  if(m<0.15) ops+=0.18;
  else if(m<0.22) ops+=0.08;
  ops+=st.persona.key==="rata"?0.10:st.persona.key==="apurado"?0.05:-0.03;
  if(st.cargo.urgente) ops+=0.08;
  ops+=(1-st.satisfaction/100)*0.08;
  ops+=(1-(st.cargo.conf??90)/100)*0.30;
  if(st.cargo.prioridad) ops-=0.06;
  ops=clamp01(Math.max(0.02,ops));
  let pay=st.term>0?(st.persona.key==="rata"?0.13:0.04)*(0.5+st.term/60):0;
  return {ops,pay:clamp01(pay),total:clamp01(ops+clamp01(pay))};
}

function nextTerm(t){const L=[0,15,30,45,60];const i=L.indexOf(t);return i<0?15:L[Math.min(i+1,L.length-1)];}

function sendQuote(){
  const st=G.st;
  if(st.finished)return;
  // BLINDAJE: el precio nunca puede salir fuera del rango válido (piso 10% .. tope 55%),
  // por más que se manipule el estado. Evita cotizar a 0 / negativo / margen imposible.
  if(st.cargo.costo!=null){
    const _floor=Math.round(st.cargo.costo*1.10), _cap=Math.round(st.cargo.costo*1.55);
    st.price=Math.max(_floor,Math.min(_cap,Math.round(st.price)));
  }
  // #1 ANTI-SPAM: si reenviás EXACTAMENTE la misma oferta (precio + plazo + tácticas),
  // no gasta una ronda y te avisa que tenés que cambiar algo. Evita perder por insistir igual.
  const sig=st.price+"|"+st.term+"|"+JSON.stringify(st.tactics);
  if(st._lastSig===sig){
    flash("Es la misma oferta que ya mandaste. Cambiá el precio, el plazo o usá una táctica.");
    showClientReaction();   // #2: re-abre la respuesta del cliente para que no parezca colgado
    return;
  }
  st._lastSig=sig;
  st.round++;
  track('send_quote',{empresa:st.cargo.co, precio:st.price, costo:st.cargo.costo, plazo:st.term, ronda:st.round, tacticas:st.tactics, interes:Math.round(acceptance()*100)});
  if(st.price>st.cargo.clientMaxViable){
    st.counter=null;st.counterTerm=null;st.clientMsg=LOSE.negocio;
    revealHint();
    if(st.round>=st.persona.maxRounds)return loseDeal(LOSE.paciencia);
    renderAll();showClientReaction();return;
  }
  const acc=acceptance();
  if(Math.random()<acc)return closeDeal();
  if(st.round>=st.persona.maxRounds){
    if(Math.random()<acc*0.6)return closeDeal();
    return loseDeal(LOSE.competidor);
  }
  const floor=st.cargo.costo*1.10,target=st.cargo.costo*st.persona.targetMult;
  st.counter=null;st.counterTerm=null;
  // ¿El cliente exige tan poco que te dejaría a PÉRDIDA? (su target real, por debajo del piso)
  // Pasa con el "Ahorrador" duro y en última ronda. Ahí abrimos la DECISIÓN a pérdida.
  const lowTarget=Math.round(st.cargo.costo*st.persona.targetMult);
  if(lowTarget<floor && st.round>=2 && st.persona.priceSens>=70){
    st.round--;   // esta no cuenta como ronda: es un ultimátum del cliente, no un ida y vuelta
    const lossPrice=Math.max(lowTarget, Math.round(st.cargo.costo*0.93)); // hasta ~-7%
    st.clientMsg="“Es lo único que puedo pagar: "+money(lossPrice)+". Tomalo o lo dejamos.”";
    revealHint(); renderAll(); showLossModal(lossPrice); return;
  }
  if(st.price>target){
    const cp=Math.round(Math.max(floor,target,st.price*(1-st.persona.concession)));
    if(cp<st.price&&cp<=st.cargo.clientMaxViable)st.counter=cp;
  }
  if(st.counter===null&&st.term<st.persona.prefTerm)st.counterTerm=Math.min(st.persona.prefTerm,nextTerm(st.term));
  let pool=acc>0.45?FRASES.cerca:st.persona.urgency>60?FRASES.apura:FRASES.compara;
  let pedido=st.counter?" Te lo tomo a "+money(st.counter)+".":st.counterTerm!=null?" El precio me cierra, pero pagame a "+st.counterTerm+" dias.":"";
  st.clientMsg="“"+pick(pool)+pedido+"”";
  revealHint();
  if(st.anger>=st.persona.angerThreshold)return loseDeal(LOSE.enojo);
  renderAll();showClientReaction();
}

// #2: muestra la RESPUESTA del cliente bien visible (modal, como "Problema en la operación").
// Si hay contraoferta, da el botón para aceptarla en el acto. Rompe el "enviar sin leer".
function showClientReaction(){
  const st=G.st;
  if(st.finished || document.getElementById('reactModal')) return;
  const acc=Math.round(acceptance()*100);
  const emoji = acc>50?'🙂':acc>30?'😐':'😟';
  const accColor = acc>50?'var(--good)':acc>30?'var(--warn)':'var(--bad)';
  let acciones='';
  if(st.counter!=null){
    acciones+=`<div class="hub-action" onclick="document.getElementById('reactModal').remove();acceptCounter()" style="border-color:var(--good)">
      <span class="ha-icon">✅</span><div class="ha-content">
      <div class="ha-title" style="color:var(--good)">Aceptar ${money(st.counter)}</div>
      <div class="ha-desc">Cerrás el trato ya, a ese precio.</div></div></div>`;
  } else if(st.counterTerm!=null){
    acciones+=`<div class="hub-action" onclick="document.getElementById('reactModal').remove();acceptCounter()" style="border-color:var(--good)">
      <span class="ha-icon">✅</span><div class="ha-content">
      <div class="ha-title" style="color:var(--good)">Aceptar y cobrar a ${st.counterTerm} días</div>
      <div class="ha-desc">Cerrás ya, dándole ese plazo de pago.</div></div></div>`;
  }
  // #1 HINT INTELIGENTE: si el problema es el PRECIO (estás por encima de lo que el
  // cliente banca), mandá a bajar el precio. Las tácticas NO arreglan un precio alto.
  // Recién cuando el precio ya es razonable, sugerí plazo/tácticas.
  const target=st.cargo.costo*st.persona.targetMult;
  const precioAlto = st.price > target*1.05;
  let hint;
  if(precioAlto){
    hint = st.persona.priceSens>=70
      ? 'Es un cliente sensible al precio y le estás cobrando caro. <b>Bajá el precio</b> (las tácticas no alcanzan si el número no le cierra).'
      : 'Te estás yendo de precio para este cliente. <b>Bajá el precio</b> acercándote a lo que quiere pagar.';
  } else {
    hint = st.persona.urgency>60
      ? 'El precio ya es razonable. Probá <b>Presión de tiempo</b> (tiene urgencia) o ajustá el plazo.'
      : st.persona.serviceVal>50
        ? 'El precio ya es razonable. Probá <b>Argumento de valor</b> o mejorá el plazo de pago.'
        : 'El precio ya es razonable. Ajustá el <b>plazo de pago</b> o usá una táctica.';
  }
  acciones+=`<div class="hub-action" onclick="document.getElementById('reactModal').remove()" style="border-color:var(--accent)">
    <span class="ha-icon">↩️</span><div class="ha-content">
    <div class="ha-title">Seguir negociando</div>
    <div class="ha-desc">${hint}</div></div></div>`;
  const d=document.createElement('div');d.className='modal';d.id='reactModal';
  d.innerHTML=`<div class="modal-box">
    <div class="modal-title">${emoji} ${st.cargo.co} te responde</div>
    <div class="story">${st.clientMsg}</div>
    <div style="font-size:12px;color:var(--muted);margin:6px 0 10px">Interés del cliente: <b style="color:${accColor}">${acc}%</b> · Ronda ${st.round}/${st.persona.maxRounds}</div>
    ${acciones}
  </div>`;
  document.body.appendChild(d);
}

function acceptCounter(){
  const st=G.st;
  if(st.finished||(st.counter==null&&st.counterTerm==null))return;
  if(st.counter!=null)st.price=st.counter;
  if(st.counterTerm!=null)st.term=st.counterTerm;
  closeDeal();
}

function useTactic(t){
  const st=G.st,p=st.persona;
  if(st.finished||st.tactics[t])return;          // 1 vez por trato
  if((G.inv[t]||0)<=0){ flash("No te quedan tácticas de «"+TACTIC_NAMES[t]+"». Cerrá cargas para ganar más."); return; }
  G.inv[t]--;                                    // gasta una del inventario
  st.tactics[t]=true;
  track('use_tactic',{tactica:t, empresa:st.cargo.co, persona:p.key, ronda:st.round});
  if(t==="tiempo"){
    if(p.urgency>60){st.tacticBonus+=0.18;flash("Presion de tiempo: le pico la urgencia.");}
    else{st.tacticBonus-=0.12;st.anger++;flash("Presion de tiempo: no tenia apuro, se MOLESTO.");}
  }
  if(t==="valor"){
    if(p.serviceVal>50){st.tacticBonus+=0.15;st.satisfaction=Math.min(100,st.satisfaction+8);flash("Argumento de valor: lo valoro.");}
    else flash("Argumento de valor: a este cliente le importa el numero, no sirvio.");
  }
  if(t==="anticipo"){
    const floor=st.cargo.costo*1.10,nuevo=Math.max(floor,Math.round(st.price*0.92));
    const bajo=st.price-nuevo;
    st.price=nuevo;st.term=0;st.tacticBonus+=0.10;
    flash("Pago anticipado: das "+money(bajo)+" de descuento a cambio de cobrar ya.");
  }
  renderAll();
}

// El jugador decide ABANDONAR la carga (incluso ya teniendo tarifa).
// Es una salida digna: penaliza poco la fama. Si había agente reservado, se enfría un poco.
function declineClient(){
  if(G.st.finished) return;
  track('deal_abandoned',{empresa:G.st.cargo.co, teniaCosto:G.st.cargo.costo!=null, ronda:G.st.round});
  const frases=["Lo lamento, esta vez no llego con el número.","No te puedo ayudar en esta operación, disculpá.","Prefiero no tomar esta carga, no me cierra.","Te quedo debiendo esta; ahora no puedo."];
  G.lost++; G.streak=0;
  if(G.st.cargo.agentId){
    G.rel[G.st.cargo.agentId]=Math.max(0,G.rel[G.st.cargo.agentId]-3);
    log("Soltaste la tarifa de "+agentById(G.st.cargo.agentId).nombre+": quedó algo molesto.");
  }
  registrarRegateoFallido();        // si le hiciste bajar y no cerraste, lo recuerda
  G.st.finished=true;
  addRep(-1);                       // abandonar a tiempo cuesta menos que fallar una entrega
  G.st.clientMsg=pick(frases);
  log("🙇 Dejaste pasar a "+G.st.cargo.co+". (reputación -1)");
  goPanel(2);                       // mostrar la pantalla de cliente (queda en "perdido")
  renderAll();
}

// Preguntarle al cliente cuánto está dispuesto a pagar (su "target").
// Casi nunca lo dice; si no, puede molestarse y bajarte la reputación.
function askTarget(){
  const st=G.st; if(st.finished||st.targetAsked) return;
  st.targetAsked=true;
  const p=st.persona;
  // Probabilidad de que afloje el número: el Confiable un poco más, el Ahorrador casi nunca.
  const tellChance = p.key==="confiable"?0.35 : p.key==="rata"?0.12 : 0.22;
  if(Math.random()<tellChance){
    // Te da una idea (un poco por debajo de su techo real, para que igual tengas que ajustar).
    st.targetKnown=Math.round(st.cargo.clientMaxViable*rnd(0.90,0.98));
    st.clientMsg="“Mirá, te soy sincero: yo manejaba un número cercano a "+money(st.targetKnown)+". Si te acercás, cerramos.”";
    flash("El cliente te soltó su target (~"+money(st.targetKnown)+").");
  }else if(Math.random()<0.5){
    // Se molesta: no le gustó que le preguntes.
    st.anger++; addRep(-2);
    st.clientMsg="“No te voy a decir cuánto tengo, pasame TU precio. No me gusta esta jugada.”";
    flash("Al cliente le molestó la pregunta. (reputación -2)");
  }else{
    // Simplemente esquiva.
    st.clientMsg="“No tengo un número fijo, mandame tu mejor propuesta y vemos.”";
    flash("El cliente esquivó la pregunta del target.");
  }
  renderAll();
}

function rejectClient(){
  if(!G.st.finished){
    G.lost++;
    if(G.st.cargo.agentId){
      G.rel[G.st.cargo.agentId]=Math.max(0,G.rel[G.st.cargo.agentId]-3);
      log("Rechazaste tras reservar tarifa: "+agentById(G.st.cargo.agentId).nombre+" quedo molesto.");
    }
    log("Pasaste a "+G.st.cargo.co+".");
    nextOrEnd();
  }
}

function closeDeal(){
  const st=G.st;
  st.finished=true;
  st.dealClosed=true;
  const m=(st.price-st.cargo.costo)/st.cargo.costo;
  G.deals++;
  G.streak++;   // racha de cierres seguidos (logros A)
  const risk=estimateRisk(st);
  const payDay=G.day+st.term+Math.round(rnd(0,3));
  const costDay=G.day+Math.min(st.cargo.agentTerm,st.term||999);
  if(st.cargo.agentId){
    G.rel[st.cargo.agentId]=Math.min(100,G.rel[st.cargo.agentId]+2);
    G.haggleFail[st.cargo.agentId]=0;   // cerraste: el agente te perdona los regateos previos
  }
  G.hagglePend=false;
  G.ops.push({co:st.cargo.co,price:st.price,costo:st.cargo.costo,risk,payDay,costDay,costPaid:false,agentId:st.cargo.agentId});
  const gan=st.price-st.cargo.costo;
  // memoria del cliente: cuántos tratos y cuánta ganancia acumulada le hiciste
  const h=G.clientHist[st.cargo.co]||(G.clientHist[st.cargo.co]={deals:0,profit:0});
  h.deals++; h.profit+=gan;
  track('deal_closed',{empresa:st.cargo.co, precio:st.price, costo:st.cargo.costo, ganancia:gan, margen:Math.round(m*100), plazo:st.term, aPerdida:!!st.tookLoss, ronda:st.round});
  if(st.tookLoss){
    // Cerraste a pérdida a propósito (apuesta por el cliente): cartel distinto, sin confeti.
    log("🤝 Cerraste "+st.cargo.co+" a PÉRDIDA ("+money(gan)+") apostando a la relación.");
    bigToast("🤝 Invertiste en el cliente<br>"+money(gan)+" ahora, por su confianza");
  }else{
    log("✅ Cerraste "+st.cargo.co+" a "+money(st.price)+" (margen "+Math.round(m*100)+"%). Cobras en "+st.term+"d.");
    confetti(); sndDeal(); bigToast("🎉 ¡Trato cerrado!<br>Ganás "+money(gan));
  }
  renderAll();
}

function loseDeal(msg){
  const st=G.st;
  st.finished=true;
  G.lost++; G.streak=0;
  track('deal_lost',{empresa:st.cargo.co, motivo:msg, teniaCosto:st.cargo.costo!=null, ronda:st.round});
  registrarRegateoFallido();        // si regateaste con el agente y no cerraste, lo recuerda
  // Una carga que NO cerraste pesa poco en tu fama (pero suma si se repite).
  addRep(-2);
  st.clientMsg=msg;
  log("❌ Perdiste a "+st.cargo.co+". (reputación -2)");
  renderAll();
}

// Si en esta operación le pediste rebaja a un agente y NO cerraste, el agente
// lo recuerda: a la 2da/3ra vez deja de bajarte la tarifa.
function registrarRegateoFallido(){
  const id=G.st.cargo.agentId;
  if(G.hagglePend && id){
    G.haggleFail[id]=(G.haggleFail[id]||0)+1;
    if(G.haggleFail[id]>=2) log(agentById(id).nombre+" ya no te va a bajar la tarifa fácil: le hiciste perder tiempo.");
  }
  G.hagglePend=false;
}

// ═══════════════════════════════════════════════════════════════════════
//  NEGOTIATION LOGIC (AGENT)
// ═══════════════════════════════════════════════════════════════════════

// Si el agente que estás (re)negociando es el que ya tenías reservado, sincroniza
// el costo del cliente con la oferta actual EN VIVO (así no hay que re-tomar la tarifa
// para que se actualice el monto de compra). Mantiene precio/viable/unwinnable al día.
function syncCostoSiReservado(){
  const an=G.aneg,c=G.st.cargo; if(!an) return;
  if(c.agentId===an.agentId){
    c.costo=an.offer; c.conf=an.conf; c.transit=an.transit; c.agentTerm=an.plazo; c.prioridad=an.prioridad;
    c.clientMaxViable=Math.round(c.costo*c.viableMult);
    c.unwinnable=c.clientMaxViable<Math.round(c.costo*1.10);
    // reacomodar el precio dentro del nuevo rango válido
    const floor=Math.round(c.costo*1.10), cap=Math.round(c.costo*1.55);
    if(G.st.price==null) G.st.price=Math.max(floor,Math.min(cap,Math.round(c.costo*(c.startMarkup||1.18))));
    else G.st.price=Math.max(floor,Math.min(cap,G.st.price));
  }
}

function openAgentNeg(agentId){
  // #3B GUARD: sin cliente activo (o sin ofertas) no se puede negociar con un agente.
  if(!G.st || !G.st.offers){ flash("Primero esperá a que llegue un cliente con una carga."); return; }
  const off=G.st.offers.find(o=>o.agentId===agentId),a=agentById(agentId);
  if(!off) return;
  // Si estás RENEGOCIANDO el agente ya reservado, arrancá desde el costo actual (no desde la lista vieja).
  const yaReservado = G.st.cargo.agentId===agentId && G.st.cargo.costo!=null;
  const startOffer = yaReservado ? G.st.cargo.costo : off.price;
  G.aneg={
    agentId,offer:startOffer,offer0:startOffer,floor:off.floor,round:0,
    transit:off.transit,validez:off.validez,conf:off.conf,
    plazo:Math.min(G.supplierTerm,a.plazoMax),prioridad:false,
    tactics:{farol:false,volumen:false,prioridad:false},
    msg:"Para "+G.st.cargo.ruta+": "+money(off.price)+". Validez "+off.validez+" dias."
  };
  G.agentUi="negociar";
  track('open_agent',{agente:a.nombre, oferta:startOffer, renegociando:yaReservado});
  goPanel(0);
  renderAll();
}

// Frases de un agente que se cansó de que le pidas y no cierres.
const AGENT_TIRED=["No puedo bajar más, ya estoy al límite.","Voy a pérdida con ese número, imaginate si bajo más.","Pregunté a gerencia y no me dieron el visto bueno.","Ya te bajé varias veces y no cerramos… así no puedo.","Es mi piso, de acá no me muevo."];

function agentDescuento(){
  const an=G.aneg,a=agentById(an.agentId);
  track('agent_haggle',{agente:a.nombre, ronda:an.round, ofertaActual:an.offer});
  G.hagglePend=true;                       // pediste rebaja en esta negociación
  // Si ya te cansó de regatear sin cerrar, NO baja más (memoria entre negociaciones).
  if((G.haggleFail[an.agentId]||0)>=2){
    an.msg=pick(AGENT_TIRED);
    renderAll();return;
  }
  if(an.round>=3){
    an.msg="Ya te di mi mejor número, "+a.nombre.split(' ')[0]+" no baja más.";
    G.rel[an.agentId]=Math.max(0,G.rel[an.agentId]-2);
    renderAll();return;
  }
  an.round++;
  const nuevo=Math.max(an.floor,Math.round(an.offer*(1-a.flex)));
  if(nuevo<an.offer){
    an.offer=nuevo;
    an.msg="Puedo llegar a "+money(nuevo)+". Es un esfuerzo.";
    G.rel[an.agentId]=Math.max(0,G.rel[an.agentId]-1);
  }else{
    an.msg=pick(AGENT_TIRED);
    G.rel[an.agentId]=Math.max(0,G.rel[an.agentId]-2);
  }
  syncCostoSiReservado();
  renderAll();
}

function agentTactic(t){
  const an=G.aneg,a=agentById(an.agentId);
  if(an.tactics[t])return;                        // 1 vez por negociación
  if((G.inv[t]||0)<=0){ flash("No te quedan tácticas de «"+TACTIC_NAMES[t]+"». Cerrá cargas para ganar más."); return; }
  G.inv[t]--;                                     // gasta una del inventario
  an.tactics[t]=true;
  track('agent_tactic',{agente:a.nombre, tactica:t});
  if(t==="farol"){
    if(Math.random()<0.45+a.flex){
      const nuevo=Math.max(an.floor,Math.round(an.offer*(1-a.flex*1.8)));
      an.offer=nuevo;
      an.msg="Mmm... no quiero perder la carga. Te lo dejo en "+money(nuevo)+".";
      flash("Farol exitoso con "+a.nombre+".");
    }else{
      G.rel[an.agentId]=Math.max(0,G.rel[an.agentId]-8);
      an.msg="Anda con ese otro entonces. Mi precio es ese.";
      flash("El farol no le creyo: la relacion bajo.");
    }
  }
  if(t==="volumen"){
    const nuevo=Math.max(an.floor,Math.round(an.offer*0.94));
    an.offer=nuevo;
    G.rel[an.agentId]=Math.min(100,G.rel[an.agentId]+3);
    an.msg="Si me das volumen, te lo dejo en "+money(nuevo)+". Cuento con vos.";
    flash("Prometiste volumen: mejor precio + relacion.");
  }
  if(t==="prioridad"){
    an.prioridad=true;
    an.offer=Math.round(an.offer*1.08);
    an.msg="Espacio garantizado y salida prioritaria. Suma "+money(Math.round(an.offer-an.offer/1.08))+".";
    flash("Pediste prioridad: +costo, pero asegura el embarque.");
  }
  syncCostoSiReservado();
  renderAll();
}

function setAgentPlazo(d){
  const a=agentById(G.aneg.agentId);
  if(d>a.plazoMax){flash(a.nombre+" no te da mas de "+a.plazoMax+"d de credito.");return;}
  G.aneg.plazo=d;
  syncCostoSiReservado();
  renderAll();
}

function lockAgent(){
  const an=G.aneg,c=G.st.cargo;
  c.costo=an.offer;c.agentId=an.agentId;c.conf=an.conf;
  c.transit=an.transit;c.agentTerm=an.plazo;c.prioridad=an.prioridad;
  c.clientMaxViable=Math.round(c.costo*c.viableMult);
  c.unwinnable=c.clientMaxViable<Math.round(c.costo*1.10);
  // #3: precio inicial con markup variable por operación (no siempre el mismo 18%)
  const _floor=Math.round(c.costo*1.10), _cap=Math.round(c.costo*1.55);
  G.st.price=Math.max(_floor,Math.min(_cap,Math.round(c.costo*(c.startMarkup||1.18))));
  G.rel[an.agentId]=Math.min(100,G.rel[an.agentId]+1);
  log("📑 Reservaste tarifa con "+agentById(an.agentId).nombre+": "+money(an.offer)+" (pago a "+an.plazo+"d).");
  track('agent_lock',{agente:agentById(an.agentId).nombre, costo:an.offer, plazo:an.plazo, transit:an.transit});
  G.aneg=null;G.agentUi="lista";
  goPanel(2); // auto-ir a clientes
  renderAll();
}

function resolveOps(){
  for(const o of G.ops){
    if(!o.costPaid&&G.day>=o.costDay){
      o.costPaid=true;G.cash-=o.costo;
      log("Pagaste al agente "+money(o.costo)+" ("+o.co+").");
    }
  }
  const due=G.ops.filter(o=>G.day>=o.payDay);
  G.ops=G.ops.filter(o=>G.day<o.payDay);
  for(const o of due){
    if(!o.costPaid){o.costPaid=true;G.cash-=o.costo;addLedger("Pago a agente · "+o.co,-o.costo);}
    if(Math.random()<o.risk.pay){
      // El cliente NO paga: lo peor que te puede pasar. Golpe fuerte a la fama.
      G.problems++;addRep(-10);
      addLedger("⚠️ "+o.co+" NO pagó",0);
      log("🟥 "+o.co+" NO PAGÓ. Perdiste "+money(o.costo)+". (reputación -10)");
      floatNum("−"+money(o.costo),"var(--bad)"); popCaja(); sndBad();
      opResultCard("🟥",o.co+" no pagó","Perdiste "+money(o.costo)+" · fama -10","var(--bad)");
    }else if(Math.random()<o.risk.ops){
      // PROBLEMA OPERATIVO: no se resuelve solo. Se encola para que el jugador DECIDA.
      // #4D: el costo extra nunca supera la ganancia del trato. Así "absorber" en el peor
      // caso te come la ganancia, pero nunca te deja en pérdida neta sorpresiva.
      const ex=Math.min(Math.max(0,o.price-o.costo), Math.round((o.price-o.costo)*rnd(0.5,1.4)));
      G.incidents.push({co:o.co, price:o.price, costo:o.costo, agentId:o.agentId, extra:ex});
      log("🟧 Problema en "+o.co+": hay que decidir cómo resolverlo.");
    }else{
      // Entrega a tiempo y sin drama: suma reputación de verdad.
      G.cash+=o.price;addRep(3);addLedger("Cobro · "+o.co,o.price);
      if(o.agentId)G.rel[o.agentId]=Math.min(100,G.rel[o.agentId]+3);
      log("💰 "+o.co+" pagó "+money(o.price)+". Entrega a tiempo. (reputación +3)");
      floatNum("+"+money(o.price),"var(--good)"); popCaja(); sndCash();
      opResultCard("✅",o.co+" pagó "+money(o.price),"Entrega a tiempo · fama +3","var(--good)");
    }
  }
}

// Registra un movimiento de caja para el historial del Escritorio.
function addLedger(concepto, monto){
  G.ledger.push({day:G.day, concepto, monto:Math.round(monto)});
  if(G.ledger.length>60) G.ledger.shift();
}

// ── PROGRESIÓN A: LOGROS / HITOS (con festejo) ─────────────────────────
// Cada uno se desbloquea una sola vez. cond(G) → true cuando se cumple.
const ACHIEVEMENTS=[
  {id:"first",   ic:"🤝", txt:"Primer trato cerrado",      cond:G=>G.deals>=1},
  {id:"deals5",  ic:"📦", txt:"5 tratos cerrados",          cond:G=>G.deals>=5},
  {id:"deals15", ic:"🏗️", txt:"15 tratos cerrados",         cond:G=>G.deals>=15},
  {id:"streak3", ic:"🔥", txt:"Racha de 3 sin perder",      cond:G=>G.streak>=3, reward:true},
  {id:"streak5", ic:"⚡", txt:"Racha de 5 sin perder",      cond:G=>G.streak>=5, reward:true},
  {id:"cashHalf",ic:"💰", txt:"Mitad de la meta en caja",   cond:G=>G.cash>=G.goal/2},
];
// Revisa logros nuevos y los encola. Se llama tras cada acción relevante.
// Los logros se muestran como VENTANA (con Aceptar), uno por vez, y recién
// DESPUÉS de que se fue el cartel de "Trato cerrado" (no se tapan).
let _achQueue=[], _achShowing=false;
function checkAchievements(){
  if(!G||G.over) return;
  for(const a of ACHIEVEMENTS){
    if(!G.achievements[a.id] && a.cond(G)){
      G.achievements[a.id]=true;
      let reward="";
      if(a.reward){                       // las rachas regalan una táctica
        const k=pick(TACTIC_KEYS); G.inv[k]=(G.inv[k]||0)+1;
        reward=TACTIC_EMOJI[k]+" "+TACTIC_NAMES[k];
      }
      _achQueue.push({ic:a.ic, txt:a.txt, reward});
      log("🏅 Logro desbloqueado: "+a.txt);
    }
  }
  if(_achQueue.length && !_achShowing){
    _achShowing=true;
    // Esperar a que el cartel de "Trato cerrado" se vaya (~1,5s) + 0,6s de respiro.
    setTimeout(showNextAch, 2100);
  }
}
function showNextAch(){
  const a=_achQueue.shift();
  if(!a){ _achShowing=false; return; }
  if(document.getElementById('achModal')){ _achQueue.unshift(a); setTimeout(showNextAch,400); return; }
  confetti(); playClin();
  const d=document.createElement('div');d.className='modal';d.id='achModal';
  d.innerHTML=`<div class="modal-box center">
    <div class="intro-logo">${a.ic}</div>
    <div class="modal-title" style="color:var(--accent)">¡Logro desbloqueado!</div>
    <div style="font-size:16px;font-weight:700;margin:6px 0">${a.txt}</div>
    ${a.reward?`<div class="note" style="background:var(--good-bg);border:1px solid rgba(74,222,128,0.25);justify-content:center"><span class="note-icon">🎁</span><span>Bonus: <b>${a.reward}</b></span></div>`:''}
    <button class="modal-close" onclick="this.closest('.modal').remove();showNextAch();">¡Genial! 🎉</button>
  </div>`;
  document.body.appendChild(d);
}

// ── PROGRESIÓN C: NIVEL (deriva de la reputación) ──────────────────────
// rep 0 = Nivel 1; cada +10 de fama sube un nivel y desbloquea clientes más grandes.
function nivel(){ return 1+Math.floor(Math.max(0,G.rep)/10); }
function nivelProg(){ return (Math.max(0,G.rep)%10)/10; }   // 0..1 hacia el próximo nivel
// Cambia la reputación dentro del rango -100..100. Si toca -100, se pierde por mala fama.
function addRep(delta){
  G.rep=clamp(G.rep+delta,-100,100);
  if(G.rep<=-100 && !G.over){ G.overReason="reputacion"; gameOver(); }
}
function tick(d){
  G.day+=d;resolveOps();
  while(G.day>=G.nextMonthly){
    const cashAntes=G.cash;
    G.cash-=G.monthly;
    addLedger("Gastos del mes",-G.monthly);
    log("Gastos del mes: -"+money(G.monthly));
    // Resumen del mes: cómo cambió tu caja desde el último cierre (toast no bloqueante).
    const variacion=G.cash-G.monthStartCash;
    const signo=variacion>=0?"+":"";
    bigToast("📅 Cerró el mes<br>Tu caja: "+signo+money(variacion)+" → "+money(G.cash));
    G.monthStartCash=G.cash;
    G.monthly=Math.round(G.monthly*1.04);
    G.nextMonthly+=30;
  }
  if(G.rep>=G.tierMsg+10){
    G.tierMsg+=10;
    const desbloqueo = G.supplierTerm<45
      ? "Tus agentes te estiran el crédito de pago."
      : "Empiezan a llegar clientes y cargas más grandes.";
    if(G.supplierTerm<45) G.supplierTerm+=15;
    bigToast("🎚️ ¡Subiste a Nivel "+nivel()+"!<br><span style='font-size:12px;opacity:.9'>"+desbloqueo+"</span>");
    log("⬆️ Nivel "+nivel()+": "+desbloqueo);
  }
  checkVictory();   // #5: ¿la caja llegó a la meta?
}

// #5 VICTORIA: la primera vez que la caja llega a la meta, celebramos y dejamos elegir
// entre cerrar la corrida (pantalla de victoria) o seguir en modo libre.
function checkVictory(){
  if(G.won || G.over) return;
  if(G.cash >= G.goal){
    G.won=true;
    track('victory',{dia:G.day, cash:Math.round(G.cash), rep:G.rep, deals:G.deals, lost:G.lost});
    flushEvents();
    showVictoryModal();
  }
}
function showVictoryModal(){
  if(document.getElementById('winModal')) return;
  confetti(); sndDeal();
  const d=document.createElement('div');d.className='modal';d.id='winModal';
  d.innerHTML=`<div class="modal-box center">

function nextOrEnd(){

  if(G.cash<0)return gameOver();
  G._needNew=true;
  if(checkTacticPrize()){ renderAll(); return; }   // mostró el premio; al cerrarlo sigue el flujo

}

function advanceTime(){

// ── Sonidos (Web Audio, sin archivos) + toggle de silencio ─────────────
let _audioCtx=null, soundOn=true;
function toggleSound(){ soundOn=!soundOn; renderHud(); if(soundOn) tone(660,0.1,"triangle"); }
// Reproduce una o varias notas. notes = [[frecuencia, retraseg], ...]
function playNotes(notes,type="sine",vol=0.22,dur=0.5){
  if(!soundOn) return;
  try{
    _audioCtx=_audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_audioCtx, now=ctx.currentTime;
    notes.forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=type;o.frequency.value=f;o.connect(g);g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0001,now+t);
      g.gain.exponentialRampToValueAtTime(vol,now+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,now+t+dur);
      o.start(now+t);o.stop(now+t+dur+0.05);
    });
  }catch(e){}
}
function tone(f,dur,type){ playNotes([[f,0]],type||"sine",0.18,dur||0.15); }
function playClin(){ playNotes([[880,0],[1318.5,0.12]],"sine",0.25,0.5); }      // premio
function sndDeal(){ playNotes([[523,0],[784,0.09],[1046,0.18]],"triangle",0.22,0.4); } // cerrar trato
function sndCash(){ playNotes([[1046,0],[1568,0.07]],"sine",0.2,0.3); }          // cobrar (ka-ching)
function sndBad(){ playNotes([[220,0],[160,0.12]],"sawtooth",0.18,0.35); }       // perder/fallo

  if(G.deals>0 && G.deals-G.lastPrizeAt>=PRIZE_EVERY){
    G.lastPrizeAt=G.deals;
    if(Math.random()<0.5){

function isPC(){ return window.matchMedia("(min-width:980px)").matches; }
function updatePanelsPosition(){
  // Marcar activo / costados (lo usa el carrusel de PC; en mobile es inofensivo).
  ["panel-agentes","panel-hub","panel-clientes"].forEach((id,i)=>{
    const p=document.getElementById(id); if(!p)return;
    p.classList.toggle("is-active", i===activePanel);
    p.classList.toggle("is-side", i!==activePanel);
  });
  if(isPC()){
    // PC: el carrusel se posiciona por variable CSS (activo centrado, costados difuminados).
    panelsEl.style.setProperty("--ap", String(activePanel));
    panelsEl.style.transform="";
  } else {
    // MOBILE: igual que siempre — transform directo (swipe de un panel a la vez).
    panelsEl.style.transform="translateX(-"+(activePanel*33.333)+"%)";
  }
}

function updateNavDots(){
  document.querySelectorAll(".nav-dot").forEach((d,i)=>{
    d.classList.toggle("active",i===activePanel);
  });
}

// ── Navegación por gesto (táctil + mouse), con baja sensibilidad ───────
// Reglas para no robar los toques a los botones:
//  • Si el gesto EMPIEZA sobre un control (botón, slider, etc.) NO se arrastra.
//  • Zona muerta: no se mueve nada hasta recorrer DEAD_ZONE px.
//  • Solo se arrastra si el gesto es claramente HORIZONTAL.
//  • Para cambiar de panel hay que superar SWIPE_THRESHOLD px.
const DEAD_ZONE=24, SWIPE_THRESHOLD=100;
const CONTROL_SEL='button,input,textarea,select,a,.seg-btn,.tactic,.hub-action,.hub-card,.agent-card,.nav-dot,.info-row,.modal';
let gStartX=0,gStartY=0,gDecided=false,gHoriz=false,gActive=false;

function gStart(x,y,target){
  // En PC no hay arrastre: el carrusel se navega con los dots o clickeando un costado.
  if(isPC()){ gActive=false; return; }
  // Si arranca sobre un control o dentro de un modal, no tomamos el gesto de swipe.
  if(target && target.closest && target.closest(CONTROL_SEL)){ gActive=false; return; }
  gStartX=x; gStartY=y; gDecided=false; gHoriz=false; gActive=true;
}
function gMove(x,y){
  if(!gActive) return;
  const dx=x-gStartX, dy=y-gStartY;
  if(!gDecided){
    if(Math.abs(dx)<DEAD_ZONE && Math.abs(dy)<DEAD_ZONE) return;   // dentro de la zona muerta: ignorar
    gDecided=true;
    gHoriz=Math.abs(dx)>Math.abs(dy)*1.8;                          // ¿es un swipe horizontal o un scroll vertical?
    if(gHoriz) panelsEl.classList.add("dragging");
  }
  if(!gHoriz) return;                                              // gesto vertical → dejar scrollear
  const base=-activePanel*33.333, extra=(dx/window.innerWidth)*33.333;
  panelsEl.style.transform="translateX(calc("+base+"% + "+extra+"%))";
}
function gEnd(x){
  if(!gActive){ return; }
  gActive=false; panelsEl.classList.remove("dragging"); panelsEl.style.cursor="";
  if(!gDecided||!gHoriz){ updatePanelsPosition(); return; }        // no fue swipe → no hacer nada
  const dx=x-gStartX;
  if(dx>SWIPE_THRESHOLD && activePanel>0) goPanel(activePanel-1);
  else if(dx<-SWIPE_THRESHOLD && activePanel<2) goPanel(activePanel+1);
  else updatePanelsPosition();
}

// Touch
panelsEl.addEventListener("touchstart",e=>gStart(e.touches[0].clientX,e.touches[0].clientY,e.target),{passive:true});
panelsEl.addEventListener("touchmove", e=>gMove(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
panelsEl.addEventListener("touchend",  e=>gEnd(e.changedTouches[0].clientX),{passive:true});
// Mouse
panelsEl.addEventListener("mousedown",e=>{ gStart(e.clientX,e.clientY,e.target); if(gActive) panelsEl.style.cursor="grabbing"; });
document.addEventListener("mousemove",e=>gMove(e.clientX,e.clientY));
document.addEventListener("mouseup",  e=>gEnd(e.clientX));
// PC: clic en un panel del costado (difuminado) lo trae al centro, sin activar el botón de abajo.
document.addEventListener("click",e=>{
  if(!isPC()) return;
  const side=e.target.closest&&e.target.closest(".panel.is-side");
  if(!side) return;
  e.preventDefault(); e.stopPropagation();
  const idx=["panel-agentes","panel-hub","panel-clientes"].indexOf(side.id);
  if(idx>=0) goPanel(idx);
}, true);

      <div class="big" style="color:var(--hub)">📦</div>
      <div style="font-size:15px;font-weight:700;margin:4px 0">Nueva consulta entrante...</div>
      <div class="btn-row"><button class="btn btn-primary" onclick="newGame()">🔄 Reiniciar</button></div>
    </div>`;
  }else{
    // Active deal
    const modoIcon=modoEmoji(c.modo);
    statusHtml=`
      <div class="card">
        <div class="card-header">
          <div class="card-icon">🏢</div>
          <div>
            <div class="card-title">${c.co}</div>
            <div class="card-subtitle">${c.op} · ${c.ruta}</div>
          </div>
        </div>
        <div class="info-row" style="padding-top:0">
          <div class="info-icon">${modoIcon}</div>
          <div class="info-content">
            <div class="info-label">Carga</div>
            <div class="info-value">${c.desc} · ${c.merc}</div>
          </div>
          ${c.urgente?'<span class="badge badge-bad">⚡ Urgente</span>':''}
        </div>
        ${G.st.flavor?`<div class="note"><span class="note-icon">${G.st.flavor.slice(0,2)}</span><span>${G.st.flavor.slice(2)}</span></div>`:""}
      </div>`;
  }

  // Action cards
  // Acción rápida: solo "Cotizar al cliente" (cuando ya tenés costo). Buscar tarifa se hace deslizando a Agentes.
  let actionsHtml="";
  if(!G.over&&G.st&&!G.st.finished&&hasCost){
    actionsHtml=`
      <div class="section-lbl">Acción rápida</div>
      <div class="hub-action" onclick="showQuoteRequestModal()" style="border-color:var(--accent)">
        <span class="ha-icon">💰</span>
        <div class="ha-content">
          <div class="ha-title" style="color:var(--accent)">Cotizar al cliente</div>
          <div class="ha-desc">Arma tu cotizacion y negocia la venta</div>
        </div>
        <span class="ha-arrow">→</span>
      </div>`;
  }

  // Progresión C: nivel visible (deriva de la fama) + barra al próximo.
  const lv=nivel(), prog=Math.round(nivelProg()*100);
  const nivelHtml=`
    <div class="section-lbl">Tu progreso</div>
    <div class="mini-list" style="padding:10px 12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <span style="font-weight:700;font-size:14px">🎚️ Nivel ${lv}</span>
        <span style="font-size:11px;color:var(--muted)">${G.rep>=0?'Subí de fama para desbloquear clientes más grandes':'Recuperá fama para volver a crecer'}</span>
      </div>
      <div class="goal-bar"><i style="width:${prog}%;background:var(--hub)"></i></div>
      ${G.streak>=2?`<div style="font-size:12px;color:var(--warn);margin-top:6px">🔥 Racha: ${G.streak} cierres seguidos</div>`:''}
    </div>
  `;

  // Resumen compacto (2 filas).
  const statsHtml=`
    <div class="section-lbl">Resumen</div>
    <div class="mini-list">
      <div class="mini-row"><span>Cerrados <b style="color:var(--good)">${G.deals}</b></span><span>Perdidos <b style="color:var(--bad)">${G.lost}</b></span></div>
      <div class="mini-row"><span>Problemas <b style="color:var(--warn)">${G.problems}</b></span><span>Gastos/mes <b style="color:var(--info)">${shortMoney(G.monthly)}</b></span></div>
    </div>
  `;

  // Operaciones en curso: botón + preview de los 3 próximos cobros.
  const opsPrev=G.ops.slice().sort((a,b)=>a.payDay-b.payDay).slice(0,3).map(o=>{
    const dC=Math.max(0,o.payDay-G.day);
    return `<div class="mini-row"><span>${o.co}</span><span style="color:var(--good)">+${shortMoney(o.price)} <span style="color:var(--muted)">${dC===0?'hoy':dC+'d'}</span></span></div>`;
  }).join("");
  const opsHtml=`
    <div class="section-lbl">Operaciones en curso</div>
    <div class="hub-action" onclick="showOpsModal()">
      <span class="ha-icon">📋</span>
      <div class="ha-content">
        <div class="ha-title">${G.ops.length} activa(s)</div>
        <div class="ha-desc">Ver detalles y avanzar tiempo</div>
      </div>
      <span class="ha-arrow">→</span>
    </div>
    <div class="mini-list">${opsPrev||'<div class="mini-empty">Sin envíos en curso</div>'}</div>
  `;

  // Pagos: solo historial + preview de los últimos 3 movimientos.
  const ledPrev=G.ledger.slice(-3).reverse().map(e=>{
    const col=e.monto>0?'var(--good)':e.monto<0?'var(--bad)':'var(--muted)';
    const txt=e.monto===0?'':(e.monto>0?'+':'')+shortMoney(e.monto);
    return `<div class="mini-row"><span>${e.concepto}</span><span style="color:${col};white-space:nowrap">${txt}</span></div>`;
  }).join("");
  const pagosHtml=`
    <div class="section-lbl">Pagos</div>
    <div class="hub-action" onclick="showLedgerModal()">
      <span class="ha-icon">🧾</span>
      <div class="ha-content">
        <div class="ha-title">Historial y pagos pendientes</div>
        <div class="ha-desc">Cobros, pagos y movimientos de caja</div>
      </div>
      <span class="ha-arrow">→</span>
    </div>
    <div class="mini-list">${ledPrev||'<div class="mini-empty">Sin movimientos todavía</div>'}</div>
  `;

  // Gestión: cómo jugar.
  const gestionHtml=`
    <div class="hub-action" onclick="showRulesModal()" style="margin-top:14px">
      <span class="ha-icon">📖</span>
      <div class="ha-content">
        <div class="ha-title">Como jugar</div>
        <div class="ha-desc">Reglas, tacticas y consejos</div>
      </div>
      <span class="ha-arrow">→</span>
    </div>
  `;

  const showGestion = !G.over && (G.ops.length>0 || G.ledger.length>0);
  const progresoHtml = (!G.over && G.st && !G.st.finished) ? nivelHtml : "";
  $("hub-content").innerHTML=statusHtml+actionsHtml+progresoHtml+statsHtml+(showGestion?opsHtml+pagosHtml:"")+gestionHtml;
}

// Modal: pagos pendientes (de operaciones en curso) + historial de movimientos de caja.
function showLedgerModal(){
  if(document.getElementById('ledgerModal')) return;
  const pend=G.ops.slice().sort((a,b)=>a.payDay-b.payDay).map(o=>{
    const dCobro=Math.max(0,o.payDay-G.day);
    const dPago=Math.max(0,(o.costDay||o.payDay)-G.day);
    return `<div class="ops-row" style="display:block">
      <div style="font-weight:700;font-size:13px;margin-bottom:2px">${o.co}</div>
      <div style="display:flex;justify-content:space-between;font-size:12px">
        <span style="color:var(--good)">▲ Cobrás ${money(o.price)}</span>
        <span style="color:var(--muted)">${dCobro===0?'hoy':'en '+dCobro+'d'}</span>
      </div>
      ${!o.costPaid?`<div style="display:flex;justify-content:space-between;font-size:12px">
        <span style="color:var(--bad)">▼ Pagás agente ${money(o.costo)}</span>
        <span style="color:var(--muted)">${dPago===0?'hoy':'en '+dPago+'d'}</span>
      </div>`:`<div style="font-size:12px;color:var(--muted)">Agente ya pagado</div>`}
    </div>`;
  }).join("") || `<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px">No hay envíos en curso.</div>`;

  const hist=G.ledger.slice().reverse().map(e=>{
    const pos=e.monto>0, zero=e.monto===0;
    const col=zero?'var(--muted)':pos?'var(--good)':'var(--bad)';
    const txt=zero?'':(pos?'+':'')+money(e.monto);
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line)">
      <span style="font-size:12px">${e.concepto}</span>
      <span style="font-size:12px;white-space:nowrap;color:var(--muted)">día ${e.day}</span>
      <span style="font-size:13px;font-weight:700;color:${col};white-space:nowrap;min-width:62px;text-align:right">${txt}</span>
    </div>`;
  }).join("") || `<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px">Todavía no hubo movimientos.</div>`;

  const d=document.createElement('div');d.className='modal';d.id='ledgerModal';
  d.innerHTML=`<div class="modal-box">
    <div class="modal-title">🧾 Pagos y movimientos</div>
    <div class="section-lbl">Pendientes (envíos en curso)</div>
    ${pend}
    <div class="section-lbl" style="margin-top:12px">Historial de caja</div>
    <div style="max-height:240px;overflow-y:auto">${hist}</div>
    <button class="modal-close" onclick="this.closest('.modal').remove()" style="margin-top:12px">Cerrar</button>
  </div>`;
  document.body.appendChild(d);
}

function renderClientes(){
  if(!G.st){$("clientes-content").innerHTML=emptyState("Esperando consulta...");return;}
  if(G.st.finished){
    // st.dealClosed lo marca closeDeal(); si no, el trato se perdió o se abandonó.
    $("clientes-content").innerHTML = G.st.dealClosed ? renderClienteCerrado() : renderClientePerdido();
    return;
  }
  if(G.st.cargo.costo==null){
    $("clientes-content").innerHTML=renderClienteConsulta();
  }else{
    $("clientes-content").innerHTML=renderClienteCotizar();
  }
}

function emptyState(msg){
  return `<div class="card center" style="margin-top:30px">
    <div style="font-size:40px;margin-bottom:8px">📦</div>
    <div style="color:var(--muted);font-size:14px">${msg}</div>
  </div>`;
}

function renderClienteConsulta(){

    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">

      ${c.urgente?'<span class="badge badge-bad">Urgente</span>':''}

    <div class="card-header">

      <div>
        <div class="card-title">${c.co}</div>
        <div class="card-subtitle">${conocido?'Ya hiciste '+h.deals+' trato(s) con ellos':'Cliente nuevo'} · ${c.op}</div>
      </div>
    </div>
    ${conocido?`<div class="note" style="background:var(--good-bg);border:1px solid rgba(74,222,128,0.2)"><span class="note-icon">🤝</span><span>¡Volvió <b>${c.co}</b>! Le generaste ${money(h.profit)} hasta ahora. Cuidalo, los clientes fieles valen oro.</span></div>`:""}
    <div class="info-row">
      <div class="info-icon">📦</div>
      <div class="info-content"><div class="info-label">Carga</div><div class="info-value">${c.desc} · ${c.merc}</div></div>
    </div>
    <div class="info-row">
      <div class="info-icon">🌍</div>
      <div class="info-content"><div class="info-label">Ruta</div><div class="info-value">${c.ruta}</div></div>
    </div>
    <div class="info-row">
      <div class="info-icon">${modoEmoji(c.modo)}</div>
      <div class="info-content"><div class="info-label">Modo</div><div class="info-value">${c.modo}</div></div>
    </div>
    <div class="story ${c.urgente?'bad':c.merc.match(/premium|diseno|diseño|Vinos/i)?'violet':''}">${c.historia}<div class="motiv">${c.motivo}</div></div>
    ${G.st.flavor?`<div class="note"><span class="note-icon">📢</span><span>${G.st.flavor}</span></div>`:""}
    <div class="note" style="background:var(--violet-bg);border:1px solid rgba(167,139,250,0.2)">
      <span class="note-icon" style="font-size:16px">🚢</span>
      <span><b>Falta la tarifa.</b><b>Agentes</b> para conseguir tu costo.</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-violet nudge" onclick="goPanel(0)">🚢 Buscar tarifa →</button>
      <button class="btn btn-ghost" onclick="rejectClient()">Rechazar</button>
    </div>
  </div>`;
}

function renderClienteCotizar(){
  const st=G.st,p=st.persona,c=st.cargo;
  const costo=c.costo,floor=Math.round(costo*1.10),cap=Math.round(costo*1.55);
  if(st.price<floor)st.price=floor;
  if(st.price>cap)st.price=cap;
  const m=(st.price-costo)/costo;
  const acc=acceptance();
  const risk=estimateRisk(st);

  return `<div class="card">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <span class="badge badge-warn">Negociando</span>
      <span style="font-size:11px;color:var(--muted)">Ronda ${st.round}/${p.maxRounds}</span>
    </div>
    <div class="card-header">
      <div class="card-icon">💰</div>
      <div>
        <div class="card-title">${c.co}</div>
        <div class="card-subtitle">${c.merc} · ${c.ruta}</div>
      </div>
    </div>

    <div class="quote-card">
      <div class="summary" style="margin:0 0 12px">
        <div class="summary-col"><span class="summary-label">Cobrás</span><span class="summary-value" style="color:var(--good)">${CURR}${Math.round(st.price/10).toLocaleString("es-AR")}</span></div>
        <div class="summary-op">-</div>
        <div class="summary-col"><span class="summary-label">Pagás</span><span class="summary-value" style="color:var(--bad)">${CURR}${Math.round(costo/10).toLocaleString("es-AR")}</span></div>
        <div class="summary-op">=</div>
        <div class="summary-col"><span class="summary-label">Ganás</span><span class="summary-value" style="color:var(--accent)">${CURR}${(Math.round(st.price/10)-Math.round(costo/10)).toLocaleString("es-AR")}</span></div>
      </div>
      <div class="range-wrap">
        <input type="range" min="${floor}" max="${cap}" value="${st.price}" step="50"
          oninput="G.st.price=+this.value;renderAll()">
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
        <span>Piso ${money(floor)}</span>
        <span style="color:${m<=0.12?'var(--warn)':'var(--good)'}">Margen ${Math.round(m*100)}%</span>
        <span>Max ${money(cap)}</span>
      </div>
    </div>

    <div class="close-bar" style="margin-top:6px"><i style="width:${Math.round(acc*100)}%;background:${acc>0.5?'var(--good)':acc>0.3?'var(--warn)':'var(--bad)'}"></i></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px">
      <span>← más barato cierra más fácil</span><span>más caro ganás más →</span>
    </div>

    <!-- Chance (grande) + consejo, compartiendo el ancho -->
    <div style="display:flex;gap:10px;align-items:stretch;margin:8px 0 4px">
      <div style="flex:0 0 auto;min-width:96px;text-align:center;background:var(--panel2,#13203a);border:1px solid var(--border,#22304d);border-radius:12px;padding:6px 10px;display:flex;flex-direction:column;justify-content:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Chance</div>
        <div style="font-size:26px;font-weight:800;line-height:1.05;color:${acc>0.5?'var(--good)':acc>0.3?'var(--warn)':'var(--bad)'}">${acc>0.6?'😀':acc>0.4?'🙂':'😟'} ${Math.round(acc*100)}%</div>
      </div>
      <div class="note ${m<0.13||acc<0.4?'warn':''}" style="flex:1;margin:0"><span class="note-icon">💬</span><span>${advice(st,acc,risk.total,m)}</span></div>
    </div>

    ${st.revealed.length?`<div class="note"><span class="note-icon">💡</span><span>${st.revealed[st.revealed.length-1]}</span></div>`:""}
    ${c.unwinnable?`<div class="note" style="background:var(--bad-bg);border:1px solid rgba(248,113,113,0.3)"><span class="note-icon">🚫</span><span>A este cliente <b>no le cierra el negocio ni a tu precio mínimo</b>. Lo más inteligente es <b>pasar</b> esta carga.</span></div>`:""}
    ${st.targetKnown?`<div class="note" style="background:var(--good-bg);border:1px solid rgba(74,222,128,0.2)"><span class="note-icon">🎯</span><span>El cliente apunta a <b>${money(st.targetKnown)}</b>. Acercate a ese número.</span></div>`:""}

    <div class="section-lbl">Plazo de pago</div>
    <div class="seg">${[0,15,30,45,60].map(d=>
      `<button class="seg-btn ${st.term===d?'on':''}" onclick="G.st.term=${d};renderAll()">${d===0?'Contado':d+'d'}<span class="seg-sub">${d===0?'hoy':'a '+d+'d'}</span></button>`
    ).join("")}</div>
    ${st.term>c.agentTerm?`<div class="note warn"><span class="note-icon">⏰</span><span>Cobras en ${st.term}d pero pagas al agente en ${c.agentTerm}d: usas tu caja.</span></div>`:""}

    <!-- Preguntar precio (izq) + Tácticas desplegable (der, overlay) -->
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="askTarget()" ${st.targetAsked?'disabled':''}>🎯 ${st.targetAsked?'Ya preguntaste':'¿Cuánto quiere pagar?'}</button>
      <details class="tact-group tact-dropdown" style="flex:1">
        <summary>🎯 Tácticas <span class="tact-caret">▾</span></summary>
        <div class="tactics tactics-menu">
          ${tacticBtn('tiempo','useTactic',st.tactics.tiempo)}
          ${tacticBtn('valor','useTactic',st.tactics.valor)}
          ${tacticBtn('anticipo','useTactic',st.tactics.anticipo)}
        </div>
      </details>
    </div>

    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-primary nudge" onclick="sendQuote()">📨 Enviar cotización</button>
      <button class="btn btn-ghost" onclick="goPanel(0)">🚢 Cambiar agente o renegociar</button>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-danger" onclick="declineClient()">🙇 No puedo ayudarte esta vez</button>
    </div>
  </div>`;
}

  const st=G.st,m=(st.price-st.cargo.costo)/st.cargo.costo;
  return `<div class="card center" style="animation:cardIn 0.4s ease">

  </div>`;
}

function renderClientePerdido(){
  return `<div class="card center" style="animation:cardIn 0.4s ease">
    <div style="font-size:48px;margin-bottom:8px">❌</div>
    <div class="big" style="color:var(--bad)">Trato perdido</div>

function renderAgentes(){
  if(!G.st||G.over){$("agentes-content").innerHTML=emptyState("Esperando consulta...");return;}
  if(G.agentUi==="negociar"){
    $("agentes-content").innerHTML=renderAgenteNeg();
  }else{
    $("agentes-content").innerHTML=renderAgenteLista();
  }
}

function renderAgenteLista(){
  const c=G.st.cargo;
  const cards=G.st.offers.map(o=>{
    const a=agentById(o.agentId),rel=G.rel[o.agentId];
    const locked=c.agentId===o.agentId;
    // Si este agente ya está reservado, mostrar el precio NEGOCIADO (no el original de la lista).
    const precio = locked && c.costo!=null ? c.costo : o.price;
    const ahorro=c.marketBase-precio;
    return `<div class="agent-card ${locked?'selected':''}">
      <div class="agent-header">
        <div class="agent-avatar">${a.emoji}</div>
        <div style="flex:1;min-width:0">
          <div class="agent-name">${a.nombre}</div>
          <div class="agent-type">${a.tipo} · ${a.desc}</div>
        </div>
        <div class="agent-rel">
          <div style="font-size:10px;color:var(--muted)">${relWord(rel)}</div>
          <div class="rel-bar"><i class="${relColorClass(rel)}" style="width:${rel}%"></i></div>
        </div>
      </div>
      <div class="agent-stats">
        <span class="agent-stat">🕒 <b>${o.transit}d</b> trans.</span>
        <span class="agent-stat">📅 <b>${o.validez}d</b> validez</span>
        <span class="agent-stat">🛡️ <b>${o.conf}%</b> conf.</span>
        <span class="agent-stat">💳 Max <b>${a.plazoMax}d</b></span>
      </div>
      <div class="agent-price-row">

function showOpsModal(){

  const cobrar=G.ops.reduce((s,o)=>s+o.price,0);
