// ═══════════════════════════════════════════════════════════════════════
// Si hay un incidente pendiente, muestra su modal. Devuelve true si mostró uno.
function checkIncidents(){
  if(G.over || !G.incidents.length || document.getElementById('incidentModal')) return false;
  const inc=G.incidents[0];
  const d=document.createElement('div');d.className='modal';d.id='incidentModal';
  d.innerHTML=`<div class="modal-box">
    <div class="modal-title" style="color:var(--warn)">🟧 Problema en la operación</div>
    <div class="story warn">Hubo un inconveniente con la carga de <b>${inc.co}</b> (un costo extra de <b>${money(inc.extra)}</b>). El cliente está esperando que lo resuelvas. ¿Qué hacés?</div>
    <div class="hub-action" onclick="resolveIncident(true)" style="border-color:var(--good)">
      <span class="ha-icon">🤝</span>
      <div class="ha-content">
        <div class="ha-title" style="color:var(--good)">Te lo soluciono yo (absorbo el costo)</div>
        <div class="ha-desc">Pagás ${money(inc.extra)} de tu bolsillo. El cliente queda agradecido. +reputación.</div>
      </div>
    </div>
    <div class="hub-action" onclick="resolveIncident(false)" style="border-color:var(--bad)">
      <span class="ha-icon">💸</span>
      <div class="ha-content">
        <div class="ha-title" style="color:var(--bad)">No puedo hacer descuento (lo paga el cliente)</div>
        <div class="ha-desc">Te ahorrás la plata, pero el cliente se enoja. -reputación.</div>
      </div>
    </div>
  </div>`;
  document.body.appendChild(d);
  return true;
}
function resolveIncident(absorb){
  const inc=G.incidents.shift();
  const m=document.getElementById('incidentModal'); if(m) m.remove();
  G.problems++;
  if(absorb){
    // Cobrás la operación pero te comés el costo extra. Buen servicio → +reputación.
    G.cash += inc.price - inc.extra;
    addLedger("Cobro (absorbiste problema) · "+inc.co, inc.price - inc.extra);
    addRep(1);
    if(inc.agentId) G.rel[inc.agentId]=Math.min(100,G.rel[inc.agentId]+1);
    log("🤝 Resolviste el problema de "+inc.co+" (absorbiste "+money(inc.extra)+"). (reputación +1)");
  }else{
    // No hacés descuento: cobrás todo, pero el cliente queda molesto → -reputación.
    G.cash += inc.price;
    addLedger("Cobro · "+inc.co, inc.price);
    addRep(-5);
    if(inc.agentId) G.rel[inc.agentId]=Math.max(0,G.rel[inc.agentId]-2);
    log("💸 No hiciste descuento en "+inc.co+": cobraste todo pero quedó molesto. (reputación -5)");
  }
  renderAll();
  checkVictory();   // #5: absorber/cobrar pudo haberte llevado a la meta
  if(G.over) return;
  if(!checkIncidents()) continuarFlujo();   // si hay más incidentes encola otro; si no, sigue
}
// Tras resolver incidentes/premios, completa el avance que estaba pendiente.
function continuarFlujo(){
  if(!G._needNew) return;
  if(checkTacticPrize()){ renderAll(); return; }   // si justo toca premio, mostralo antes del cliente nuevo
  // CAPACIDAD: si ya tenés el máximo de operaciones en curso, no llega cliente nuevo
  // hasta que se libere alguna (avanzando el tiempo).
  if(G.ops.length>=G.capacity){ G.st=null; renderAll(); showSinCapacidad(); return; }
  G._needNew=false;
  newClient(); goPanel(1); renderAll();
  showConsultaModal();   // avisar que llegó una consulta nueva
}

// Aparece cuando el cliente solo cerraría a un precio que te deja por debajo del
// 10% (a pérdida). El jugador decide con una pista del potencial del cliente.
function showLossModal(lossPrice){
  if(document.getElementById('lossModal')) return;
  const st=G.st, costo=st.cargo.costo;
  const pot=clientePotencial(st.persona);
  const margenPct=Math.round((lossPrice-costo)/costo*100);
  const cajaBaja = G.cash < G.monthly;
  const d=document.createElement('div');d.className='modal';d.id='lossModal';
  d.innerHTML=`<div class="modal-box">
    <div class="modal-title" style="text-align:center">🤔 ¿Vale la pena?</div>
    <p style="text-align:center;color:var(--txt2);font-size:13px;margin-bottom:8px">${st.cargo.co} solo cierra a <b>${money(lossPrice)}</b>, que te deja a <b style="color:var(--bad)">pérdida (${margenPct}%)</b>.</p>
    <div class="note" style="background:var(--panel2)"><span class="note-icon" style="font-size:20px">${pot.ic}</span><span><b>${pot.txt}.</b> ${pot.desc}</span></div>
    ${cajaBaja?`<div class="note warn"><span class="note-icon">💰</span><span>Tu caja está ajustada: comerte una pérdida ahora es arriesgado.</span></div>`:""}
    <div class="hub-action" onclick="acceptLoss(${lossPrice})" style="border-color:var(--bad)">
      <span class="ha-icon">💸</span>
      <div class="ha-content"><div class="ha-title" style="color:var(--bad)">Aceptar a pérdida (${money(lossPrice-costo)})</div>
        <div class="ha-desc">Cerrás perdiendo plata, pero ganás al cliente. Si es bueno, vuelve con mejores tratos.</div></div>
    </div>
    <div class="hub-action" onclick="document.getElementById('lossModal').remove()" style="border-color:var(--warn)">
      <span class="ha-icon">🤝</span>
      <div class="ha-content"><div class="ha-title" style="color:var(--warn)">Seguir negociando</div>
        <div class="ha-desc">Volvés a la cotización. Arriesgás que el cliente se vaya.</div></div>
    </div>
    <div class="hub-action" onclick="document.getElementById('lossModal').remove();rejectClient()">

      <div class="ha-content"><div class="ha-title">Abandonar la carga</div>
        <div class="ha-desc">No gastás más tiempo ni plata. A veces es lo más sabio.</div></div>
    </div>
  </div>`;
  document.body.appendChild(d);
}
function acceptLoss(lossPrice){
  track('loss_decision',{accion:"aceptar_a_perdida", empresa:G.st.cargo.co, precio:lossPrice, costo:G.st.cargo.costo});
  document.getElementById('lossModal')?.remove();
  G.st.price=lossPrice;
  // Recompensa por bancar al cliente: si es bueno, salta su satisfacción (y vuelve mejor).
  if(G.st.persona.key!=="rata") G.st.satisfaction=Math.min(100,G.st.satisfaction+25);
  G.st.tookLoss=true;
  closeDeal();
}

    <div class="modal-sub">⭐ Las 2 cosas que tenés que cuidar</div>
    <p style="font-size:13px;color:var(--txt2);line-height:1.7">
      💵 <b>La PLATA (caja):</b> si te quedás en cero, perdés.<br>
      😊 <b>La FAMA (reputación, de -100 a +100):</b> cumplí y sube; fallá y baja. Si llega a -100, nadie quiere trabajar con vos y perdés.
    </p>

    <div class="modal-sub">💡 Trucos</div>
    <p style="font-size:13px;color:var(--txt2);line-height:1.7">
      • El agente más barato a veces da más problemas. 😬<br>
      • Si hay un problema, podés <b>ayudar al cliente</b> (perdés algo de plata pero ganás fama) o <b>no</b> (guardás la plata pero el cliente se enoja).<br>
      • A veces lo más inteligente es <b>decir que no</b> a un mal negocio.
    </p>
    <button class="modal-close" onclick="this.closest('.modal').remove()">¡Entendido! 👍</button>
  </div>`;
  document.body.appendChild(d);
  d.addEventListener('click',e=>{if(e.target===d)d.remove();});
}

function showFeedbackModal(manual=false){
  if(feedbackShown&&!manual)return;
  feedbackShown=true;
  if(feedbackTimeout)clearTimeout(feedbackTimeout);
  const d=document.createElement('div');d.className='modal';
  d.innerHTML=`<div class="modal-box" style="padding:18px">
    <div class="modal-title" style="margin-bottom:10px">📝 ¿Qué te pareció?</div>
    <label style="font-size:12px;color:var(--muted)">Puntuación:</label>
    <div class="rating" id="fbStars" style="margin:6px 0"><span class="star" data-v="1">☆</span><span class="star" data-v="2">☆</span><span class="star" data-v="3">☆</span><span class="star" data-v="4">☆</span><span class="star" data-v="5">☆</span></div>
    <input type="hidden" id="fbRating" value="0">
    <label style="font-size:12px;color:var(--muted)">¿Volverías a jugar?</label>
    <div class="seg" style="margin:4px 0 8px"><button class="seg-btn" type="button" id="fbY">✅ Sí</button><button class="seg-btn" type="button" id="fbN">❌ No</button><button class="seg-btn" type="button" id="fbM">🤔 Tal vez</button></div>
    <input type="hidden" id="fbAgain" value="">
    <label style="font-size:12px;color:var(--muted)">Comentarios:</label>
    <textarea id="fbCom" rows="2" class="fb-input" style="margin:4px 0 0" placeholder="Me gustó... me confundí en..."></textarea>
    <button class="modal-close" style="margin-top:10px" onclick="submitFeedback()">📤 Enviar</button>
    <button class="modal-close ghost" onclick="this.closest('.modal').remove()">Cerrar</button>
  </div>`;
  document.body.appendChild(d);

  const stars=d.querySelectorAll('.star'),ri=d.querySelector('#fbRating');
  stars.forEach(s=>s.addEventListener('click',()=>{
    const v=+s.dataset.v;ri.value=v;
    stars.forEach((x,i)=>x.innerHTML=i<v?'★':'☆');
    stars.forEach((x,i)=>x.classList.toggle('on',i<v));
  }));
  const reset=()=>['#fbY','#fbN','#fbM'].forEach(id=>d.querySelector(id).classList.remove('on'));
  d.querySelector('#fbY').addEventListener('click',function(){reset();this.classList.add('on');d.querySelector('#fbAgain').value='Si';});
  d.querySelector('#fbN').addEventListener('click',function(){reset();this.classList.add('on');d.querySelector('#fbAgain').value='No';});
  d.querySelector('#fbM').addEventListener('click',function(){reset();this.classList.add('on');d.querySelector('#fbAgain').value='Tal vez';});
  d.addEventListener('click',e=>{if(e.target===d)d.remove();});
}

function submitFeedback(){
  const modal=document.querySelector('.modal');
  if(!modal)return;
  const name='Anonimo';   // ya no pedimos nombre
  const rating=modal.querySelector('#fbRating').value||'0';
  const again=modal.querySelector('#fbAgain').value||'Sin responder';
  const comments=modal.querySelector('#fbCom').value||'';
  const mins=Math.floor((Date.now()-G.startTime)/60000);
  const stats=`Dia ${G.day} | Cerrados ${G.deals} | Rep ${G.rep} | Caja ${shortMoney(G.cash)} | Min ${mins}`;

  track('feedback_submit',{rating,again});
  flushEvents();
  const GOOGLE_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwzbroCokgpRllaM_z6JLsAZvB5R5s2d-nIO_D8SbreGnKcCmwXUX2uLQivtlp954ac/exec';
  fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({k:API_KEY,sid:SESSION_ID,name,rating,again,comments,stats,date:new Date().toLocaleString()})});

  alert('¡Gracias por tu feedback! Se guardo correctamente.');
  modal.remove();
}

let helpMode=false;

  ["Renegociar", {t:"🤝 Volver a negociar", b:"Ya habías arreglado un precio con este agente, pero querés intentar mejorarlo otra vez. Tocás acá y volvés a la charla con él. Ojo: si le pedís rebaja muchas veces y nunca terminás cerrando con él, se va a cansar y dejará de bajarte el precio."}],

  ["Tomar tarifa", {t:"✓ Aceptar el precio del agente", b:"Le decís que SÍ al precio que te ofrece este agente. A partir de ahora, ese número es tu COSTO para esta carga. El juego te lleva automáticamente con el cliente, donde vas a ponerle TU precio (más alto que el costo) para ganar la diferencia. Elegí bien: el agente más barato a veces da más problemas durante el viaje."}],

  ["Pedir prioridad", {t:"⚡ Pedir que salga rápido y seguro", b:"Le pedís al agente que tu carga viaje con prioridad: que salga primero y con lugar garantizado. Esto te cuesta un poco más de plata, pero la carga llega antes y baja el riesgo de que algo salga mal. Es ideal cuando el cliente está MUY apurado, porque después podés cerrar más fácil con él."}],
  ["Enviar cotiz", {t:"📨 Enviar tu precio al cliente", b:"Le mandás al cliente la oferta que armaste (tu precio + el plazo de pago). Es el momento más importante. El cliente puede: decir «¡SÍ, cerramos!», pedirte que se lo dejes un poco más barato, pedirte más días para pagar, o irse con otro forwarder. Antes de enviar, fijate la barra de «cierre estimado»: si está muy baja, mejor ajustá el precio."}],

  ["No puedo ayudarte", {t:"🙇 Dejar pasar esta carga", b:"A veces un negocio simplemente no te conviene: el cliente no paga lo suficiente, o es muy arriesgado, o no llegás a un precio que te deje ganancia. Con este botón le decís amablemente «esta vez no puedo» y dejás pasar la carga. Pierde un poquito de fama (mucho menos que fallar una entrega), pero saber decir que NO a tiempo es una de las habilidades más importantes del juego. ¡No todas las cargas valen la pena!"}],

  ["Aceptar", {t:"✓ Aceptar lo que pide el cliente", b:"El cliente te hizo una contraoferta: te pidió un precio más bajo o más días para pagar. Si tocás «Aceptar», le decís que SÍ a lo que pidió y se cierra el trato ahí mismo. Antes de aceptar, fijate que todavía te quede una ganancia que valga la pena (mirá el margen). Si te deja muy poquito, capaz conviene contraofertar o pasar."}],
  ["Contraofertar", {t:"🤝 Hacer otra oferta", b:"No te convence lo que te pidió el cliente, así que en vez de aceptar, volvés a la pantalla de cotización para cambiar tu precio o tus condiciones y mandarle una propuesta nueva. Cada ida y vuelta es una «ronda»; si te ponés a regatear demasiado, el cliente se cansa y se puede ir, así que no abuses."}],

  ["Siguiente cliente", {t:"➡️ Pasar al que sigue", b:"Esta carga ya terminó (la cerraste, la perdiste o la dejaste pasar). Tocás acá y llega un cliente nuevo con otra carga distinta, y el ciclo vuelve a empezar: conseguir tarifa con el agente, ponerle precio al cliente, cerrar. Mientras tanto, pasan unos días en el juego."}],
  ["Avanzar tiempo", {t:"⏩ Que pasen los días", b:"Hacés que el calendario avance varios días de golpe. Esto es importante porque las cargas que cerraste se cobran DESPUÉS de unos días, no al instante. Avanzando el tiempo llegás a los días en que te pagan. Pero ojo: al pasar el tiempo también llegan los gastos del mes (sueldos, oficina), así que no podés vivir solo avanzando: tenés que cerrar negocios."}],

  ["Cotizar al cliente", {t:"💰 Ponerle precio al cliente", b:"Te lleva a la pantalla donde armás tu oferta para el cliente: elegís cuánto le cobrás (con la barra de precio), en cuántos días te paga, y podés usar tácticas. Cuando esté lista, la mandás con «Enviar cotización»."}],
  ["Operaciones en curso", {t:"📋 Tus envíos en camino", b:"Acá ves la lista de todas las cargas que ya cerraste y que ahora están viajando. De cada una te muestra: cuánta plata vas a cobrar, en cuántos días la cobrás, cuándo le tenés que pagar al agente, y un puntito de color que indica el riesgo (verde = seguro, rojo = peligroso). Te sirve para saber cuánta plata tenés por entrar."}],

  ["Riesgo bajo", {t:"🛡️ Riesgo bajo", b:"Esta operación es bastante segura: lo más probable es que todo salga bien, el cliente pague y no haya sustos. Podés cerrarla tranquilo."}],
  ["confiable", {t:"🛡️ Confiabilidad del agente", b:"Es un porcentaje que mide qué tan bien trabaja ese agente y qué tan seguro es que la carga llegue sin problemas. 95% es buenísimo (casi nunca falla); 60% es flojito (puede tener líos en el camino, demoras o roturas que te cuestan plata). Por lo general, los agentes más baratos son los menos confiables: ahí está el dilema de ahorrar vs. estar tranquilo."}],
  ["transit", {t:"🕒 Tiempo de viaje (tránsito)", b:"Es cuántos días tarda la carga en llegar de un lugar al otro. Menos días es mejor, sobre todo si el cliente está apurado. El barco es lento (muchos días), el avión es rapidísimo (pocos días) pero más caro. Elegí según cuánto apura el cliente."}],
  ["validez", {t:"📅 Validez de la tarifa", b:"Es cuántos días te dura el precio que te dio el agente. Después de esos días, el precio se vence y puede cambiar (normalmente sube). Por eso conviene no demorar demasiado en cerrar con el cliente una vez que reservaste la tarifa."}],
  ["Cobras", {t:"💵 Lo que cobrás", b:"Es la plata que te va a dar el cliente por esta operación, y en cuántos días te la paga. Si elegiste «contado», la cobrás enseguida; si diste plazo (15, 30, 60 días), la vas a recibir más adelante. Tener plata por cobrar está bien, pero no es plata que ya tengas en la mano."}],
  ["Pagas", {t:"💸 Lo que pagás", b:"Es la plata que vos le tenés que dar al agente por llevar la carga, y en cuántos días se la pagás. ¡Acá está uno de los secretos del juego! Si vos le pagás al agente ANTES de que el cliente te pague a vos, tenés que poner esa plata de tu propio bolsillo mientras tanto. Por eso conviene que el cliente te pague rápido y vos al agente lo más tarde posible."}],
  ["Ruta", {t:"🌍 La ruta", b:"Te muestra desde qué ciudad/país sale la carga y a cuál tiene que llegar (por ejemplo «Shanghái → Buenos Aires»). La distancia y el recorrido influyen en cuánto cuesta y cuánto tarda el viaje."}],
  ["Carga", {t:"📦 La carga", b:"Es qué es exactamente lo que hay que mover y cuánto. Por ejemplo «3x40'HC» significa 3 contenedores grandes; «1.800 kg» son 1.800 kilos. Algunas cargas son especiales (como las que necesitan frío) y son más delicadas de transportar."}],
  ["Modo", {t:"🚢 Cómo viaja la carga", b:"Es el medio de transporte: barco (marítimo: barato pero lento), avión (aéreo: rápido pero caro) o camión (terrestre: para distancias cortas dentro de la misma región). Cada cliente necesita uno según su carga y su apuro."}],
];
// Glosario: palabras/siglas sueltas que aparecen dentro de los textos del juego.
const GLOSARIO=[
  [/40'?HC|40HQ|40'?HQ/i, {t:"📦 Contenedor 40'HC", b:"Es uno de los contenedores más usados del mundo: una caja gigante de metal de unos 12 metros de largo (como un colectivo) y un poquito más alto que el normal (por eso «HC», que significa «high cube», alto). Cuando ves «3x40'HC» quiere decir que el cliente quiere mandar 3 de esos contenedores llenos."}],
  [/reefer/i, {t:"❄️ Reefer (contenedor refrigerado)", b:"«Reefer» es un contenedor que tiene una heladera incorporada y mantiene todo frío durante el viaje. Se usa para cosas que se echan a perder con el calor: vinos, frutas, carne, pescado, flores, medicamentos. Es más caro de transportar, pero necesario para esas cargas. Si la heladera falla, se arruina toda la mercadería."}],
  [/CBM/i, {t:"📐 CBM (metros cúbicos)", b:"Es una forma de medir cuánto LUGAR ocupa una carga (no cuánto pesa, sino cuánto espacio). 1 CBM es un cubo de 1 metro de alto, 1 de ancho y 1 de largo. Cuando ves «18 CBM», imaginate 18 de esas cajas grandes. Sirve para saber si la carga entra en un contenedor o cuánto espacio hay que reservar."}],
  [/cadena de fr[ií]o/i, {t:"❄️ Cadena de frío", b:"Es mantener la carga siempre fría, sin cortes, desde que sale hasta que llega: en el depósito, en el camión, en el barco, en todos lados. Si en algún momento se calienta aunque sea un rato, la mercadería (comida, flores, remedios) se arruina y es pérdida total. Por eso los clientes que la necesitan son muy exigentes con que no falle."}],
  [/sobredimensionada/i, {t:"📏 Carga sobredimensionada", b:"Es una carga tan GRANDE que no entra en un contenedor normal, como una cosechadora, una turbina o una máquina enorme. Necesita transporte especial: camiones con plataformas extra largas, permisos para circular y a veces hasta un auto que la acompañe en la ruta. Por todo eso es más cara y complicada de mover."}],
  [/Importaci[oó]n/i, {t:"📥 Importación", b:"Es traer mercadería desde otro país hacia el tuyo. Por ejemplo, una empresa argentina que compra electrónica en China y la trae a Buenos Aires está importando. El cliente importador necesita que vos le traigas su compra desde afuera."}],
  [/Exportaci[oó]n/i, {t:"📤 Exportación", b:"Es mandar mercadería desde tu país hacia otro. Por ejemplo, una bodega de Mendoza que vende su vino a Estados Unidos está exportando. El cliente exportador necesita que vos le lleves su producto al exterior."}],
  [/Contado/i, {t:"💵 Pago al contado", b:"Significa que el cliente te paga YA, en el mismo momento de cerrar, sin esperar. Es lo mejor para tu caja porque tenés la plata enseguida y no hay riesgo de que después no te pague. La desventaja es que a los clientes les gusta más tener unos días para pagar, así que pedir contado puede hacer un poco más difícil cerrar."}],
  [/Piso/i, {t:"⬇️ Precio piso (el mínimo)", b:"Es el precio más bajo que el juego te deja ponerle al cliente. Está calculado para que, aunque cobres lo mínimo, siempre ganes aunque sea un poquito y nunca pierdas plata de entrada. Si arrastrás la barra todo hacia la izquierda, llegás al piso: cierre más fácil, pero ganancia chiquita."}],
  [/Max|Máx/i, {t:"⬆️ Precio máximo", b:"Es lo más caro que el juego te permite pedirle al cliente. Llegar al máximo te daría la mayor ganancia posible… pero casi ningún cliente acepta un precio tan alto, así que probablemente se vaya. Es el otro extremo de la barra del precio."}],
];

// Explicaciones para cosas que NO son botones de texto (palancas, dots, etc.)
function helpFor(el){
  // dots de navegación
  const dot=el.closest('.nav-dot');
  if(dot){ return {t:"🔵 Cambiar de pantalla",
    b:"El juego tiene 3 pantallas y estos puntitos te muestran en cuál estás (el iluminado). Podés tocar un puntito o deslizar con el dedo para viajar entre ellas: a la IZQUIERDA están los AGENTES (las empresas que llevan tu carga y te dan el costo), en el MEDIO el ESCRITORIO (un resumen de todo), y a la DERECHA los CLIENTES (los que te piden cargas y te pagan). Tu trabajo es ir y venir entre los agentes y los clientes."}; }
  // slider de precio
  if(el.type==="range") return {t:"🎚️ La barra del precio",
    b:"Esta es la herramienta más importante de la venta. Arrastrándola elegís cuánto le cobrás al cliente. Si la movés hacia la DERECHA, el precio sube: ganás más plata, pero al cliente le cuesta más decir que sí. Si la movés hacia la IZQUIERDA, baja: cerrás más fácil pero ganás menos. No hay un número mágico: depende de cada cliente (uno apurado aguanta más caro, uno tacaño quiere todo barato). El juego es justamente encontrar ese punto justo para cada uno."};
  // botones de plazo de pago
  if(el.closest('.seg')) return {t:"📅 El plazo de pago (cuándo te paga el cliente)",
    b:"Elegís en cuántos días el cliente te va a pagar: «Contado» es ya mismo, o podés darle 15, 30, 45 o 60 días. A los clientes les ENCANTA que les des muchos días (les facilita la vida), así que dar plazo ayuda a cerrar. PERO tiene una trampa: vos quizás tengas que pagarle al agente antes de cobrarle al cliente, y mientras tanto esa plata sale de tu bolsillo. Si das demasiados días y te quedás sin plata en la mano, no podés pagar tus gastos. Es un equilibrio: plazo para atraer, pero sin descuidar tu caja."};
  // tarjeta de agente
  if(el.closest('.agent-card')) return {t:"🚢 La oferta de un agente",
    b:"Cada tarjeta es una empresa de transporte ofreciéndote llevar la carga. Mirá bien los 4 datos: el PRECIO (cuánto te cobra, o sea tu costo), el TRANSIT (días que tarda el viaje), la CONFIABILIDAD en % (qué tan seguro es que llegue sin problemas) y la RELACIÓN (qué tan amigo tuyo es, que mejora con el tiempo si le comprás). La gran decisión: el agente barato te deja más ganancia pero suele fallar más; el caro te cuida pero te come margen. Tocá «Negociar» para hablar con él y tratar de bajar su precio antes de aceptar."};
  // HUD cells
  const cell=el.closest('.hud-cell');
  if(cell){ const lbl=(cell.querySelector('.hud-lbl')||{}).textContent||"";
    if(/Caja/i.test(lbl)) return {t:"💵 Tu caja (tu plata)",b:"Es toda la plata que tenés disponible ahora mismo. Sube cuando cobrás operaciones y baja cuando le pagás a los agentes y cuando llegan los gastos del mes. Es tu signo vital más importante: si la caja llega a CERO, perdés el juego (te fundiste). Por eso hay que cuidarla: no dar plazos tan largos que te dejen sin plata, y cerrar negocios seguido para que siga entrando."};
    if(/Repu/i.test(lbl)) return {t:"😊 Tu reputación (tu fama)",b:"Mide qué tan bien te portás como forwarder. Va desde -100 (pésima fama) hasta +100 (sos un genio). Sube cuando cumplís y entregás bien; baja cuando fallás, cuando un cliente no te paga, o cuando dejás pasar cargas. Es importante por dos motivos: con buena fama te llegan clientes mejores y los agentes te dan más confianza; pero si tu fama cae hasta -100, nadie quiere trabajar con vos y también perdés el juego."};
    if(/Dia/i.test(lbl))  return {t:"📅 El día actual",b:"Te dice en qué día del juego estás. El tiempo avanza cada vez que atendés un cliente nuevo o cuando tocás «avanzar tiempo». El día importa porque los cobros y los pagos pasan en fechas futuras (por ejemplo «cobrás en 30 días»), y porque cada cierto tiempo llegan los gastos del mes que tenés que poder pagar."};
    if(/Ops/i.test(lbl))  return {t:"📋 Operaciones en curso",b:"Te muestra cuántas cargas tenés viajando en este momento, sobre el máximo que podés manejar a la vez (por ejemplo «2/4» son 2 de un máximo de 4). Tocá acá para ver el detalle de cada envío: cuánto y cuándo vas a cobrar, cuándo le pagás al agente y qué tan riesgoso es. Si llegás al máximo, no podés tomar cargas nuevas hasta que se resuelva alguna."};
  }
  return null;
}
function toggleHelp(){
  helpMode=!helpMode;
  document.getElementById('helpFab').classList.toggle('on',helpMode);
  document.body.classList.toggle('help-mode',helpMode);
  document.getElementById('helpBanner')?.remove();
  document.querySelector('.help-tip')?.remove();
  if(helpMode){
    const b=document.createElement('div');b.className='help-banner';b.id='helpBanner';
    b.innerHTML="🟡 MODO AYUDA: tocá cualquier botón y te explico qué hace (no va a pasar nada en el juego). Tocá el ❓ otra vez para salir.";
    document.body.appendChild(b);
  }
}
function showHelpTip(info){
  document.querySelector('.help-tip')?.remove();
  const d=document.createElement('div');d.className='help-tip';
  d.innerHTML=`<div class="ht-title">${info.t}</div><div class="ht-body">${info.b}</div>
    <button class="ht-close" onclick="this.closest('.help-tip').remove()">¡Entendí! 👍</button>`;
  document.body.appendChild(d);
}
// Interceptor en fase de CAPTURA: si el modo ayuda está activo, explica CUALQUIER
// cosa que toques (botón, dato, texto) en vez de ejecutar la acción.
document.addEventListener('click',function(e){
  if(!helpMode) return;
  if(e.target.closest('.help-fab,.help-tip,.help-banner')) return;  // la propia ayuda funciona normal
  // tomamos el elemento más específico que tenga texto, o el que tocaste
  let el=e.target;
  if(!el || el===document.body) return;
  e.preventDefault(); e.stopPropagation();

  // 1) Casos especiales por tipo de elemento (slider, dots, HUD, tarjetas, plazo)
  let info=helpFor(el) || helpFor(el.parentElement||el);
  const txt=((el.textContent||"")+" "+(el.getAttribute&&el.getAttribute('placeholder')||"")).replace(/\s+/g," ").trim();

  // 2) Glosario: siglas/palabras sueltas dentro del texto (40'HC, reefer, CBM…)
  if(!info){ const g=GLOSARIO.find(([rx])=>rx.test(txt)); if(g) info=g[1]; }
  // 3) Diccionario de botones/datos por coincidencia de texto
  if(!info){ const hit=HELP.find(([k])=>txt.includes(k)); if(hit) info=hit[1]; }
  // 4) Si hay un mensaje del cliente/agente (la "historia"), explicarlo
  if(!info && el.closest('.story')) info={t:"💬 Lo que te dicen", b:"Esto es lo que te cuenta el cliente (o el agente). Leelo: te da pistas sobre qué le importa, si tiene apuro o cuánto quiere pagar."};
  // 5) Última opción: explicación genérica según dónde tocaste
  if(!info){
    if(txt.length>0 && txt.length<60) info={t:"ℹ️ «"+txt+"»", b:"Es un dato de la operación. Te sirve para decidir qué precio poner y cómo negociar. Tocá el ❓ para salir de la ayuda y seguir jugando."};
    else info={t:"ℹ️ Información", b:"Esto es info que te ayuda a tomar decisiones. Salí del modo ayuda con el ❓ celeste para volver a jugar."};
  }
  showHelpTip(info);
},true);

// Start
newGame();
showIntro();   // pantalla de bienvenida la primera vez
