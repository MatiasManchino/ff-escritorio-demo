<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Freight Forwarder — El Escritorio</title>
<style>
  /* ═══════════════════════════════════════════════════════════
     FREIGHT FORWARDER v4 — El Escritorio (Rediseño 2026)
     Swipe navigation · Hub central · Estilo premium oscuro
     ═══════════════════════════════════════════════════════════ */
  :root{
    --bg:#070b14;
    --bg-gradient:radial-gradient(ellipse 140% 100% at 50% 0%,#0f1f3a 0%,#070b14 55%);
    --panel:#0e1624;
    --panel2:#141e32;
    --panel3:#1a2640;
    --line:#253554;
    --line2:#2d4466;
    --txt:#e8eef6;
    --txt2:#c4d0e0;
    --muted:#7a8fa8;
    --muted2:#556680;
    --accent:#f4845f;
    --accent2:#ff9e7d;
    --good:#4ade80;
    --good-bg:rgba(74,222,128,0.08);
    --bad:#f87171;
    --bad-bg:rgba(248,113,113,0.08);
    --warn:#fbbf24;
    --warn-bg:rgba(251,191,36,0.08);
    --info:#60a5fa;
    --info-bg:rgba(96,165,250,0.08);
    --violet:#a78bfa;
    --violet-bg:rgba(167,139,250,0.08);
    --hub:#38bdf8;
    --shadow:0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg:0 8px 40px rgba(0,0,0,0.5);
    --radius:16px;
    --radius-sm:12px;
    --radius-xs:8px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}

  html,body{
    width:100%;height:100%;overflow:hidden;
    background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
    font-size:15px;line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }

  body{background:var(--bg-gradient)}

  /* ===== VIEWPORT & SWIPE CONTAINER ===== */
  .app{
    width:100%;height:100%;display:flex;flex-direction:column;
    position:relative;overflow:hidden;
  }

  .panels-container{
    flex:1;display:flex;width:300%;height:100%;
    transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
    will-change:transform;
    touch-action:pan-y;
  }
  .panels-container.dragging{transition:none}

  .panel{
    width:33.333%;height:100%;overflow-y:auto;overflow-x:hidden;
    padding:0 14px 100px;position:relative;
    scrollbar-width:none;
  }
  .panel::-webkit-scrollbar{display:none}

  /* ===== HUD ===== */
  .hud{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(7,11,20,0.88);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line);padding:8px 12px 6px;
    display:flex;gap:6px;align-items:center;
  }
  .hud-spacer{height:62px;flex-shrink:0}

  .hud-cell{
    flex:1;text-align:center;padding:5px 2px;border-radius:var(--radius-xs);
    background:var(--panel);border:1px solid var(--line);
    min-width:0;position:relative;
  }
  .hud-cell.alert{background:var(--bad-bg);border-color:rgba(248,113,113,0.3)}
  .hud-cell.click{cursor:pointer;transition:transform .12s}
  .hud-cell.click:active{transform:scale(0.96)}
  .hud-lbl{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;white-space:nowrap}
  .hud-val{font-size:14px;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hud-badge{
    position:absolute;top:-4px;right:3px;background:var(--bad);color:#fff;
    font-size:8px;font-weight:700;border-radius:6px;padding:1px 4px;min-width:14px;
  }

  /* ===== NAV DOTS ===== */
  .nav-dots{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:rgba(7,11,20,0.88);backdrop-filter:blur(16px);
    border-top:1px solid var(--line);padding:10px 0 14px;
    display:flex;justify-content:center;align-items:center;gap:20px;
  }
  .nav-dot{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;opacity:0.45;transition:opacity 0.2s;
    user-select:none;-webkit-user-select:none;
  }
  .nav-dot.active{opacity:1}
  .nav-dot .dot-circle{
    width:10px;height:10px;border-radius:50%;background:var(--muted2);
    transition:all 0.25s cubic-bezier(0.32,0.72,0,1);
    position:relative;
  }
  .nav-dot.active .dot-circle{background:var(--accent);transform:scale(1.3)}
  .nav-dot .dot-label{
    font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);
  }
  .nav-dot.active .dot-label{color:var(--txt)}
  .nav-dot[data-panel="0"].active .dot-circle{background:var(--violet)}
  .nav-dot[data-panel="0"].active .dot-label{color:var(--violet)}
  .nav-dot[data-panel="1"].active .dot-circle{background:var(--hub)}
  .nav-dot[data-panel="1"].active .dot-label{color:var(--hub)}
  .nav-dot[data-panel="2"].active .dot-circle{background:var(--accent)}
  .nav-dot[data-panel="2"].active .dot-label{color:var(--accent2)}

  /* ===== CARDS ===== */
  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:18px;margin-bottom:12px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
    animation:cardIn 0.28s ease-out;
  }
  @keyframes cardIn{
    from{opacity:0;transform:translateY(16px) scale(0.98)}
    to{opacity:1;transform:none}
  }
  .card-header{
    display:flex;align-items:center;gap:12px;margin-bottom:14px;
  }
  .card-icon{
    width:44px;height:44px;border-radius:var(--radius-sm);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;flex-shrink:0;background:var(--panel3);
  }
  .card-title{font-size:16px;font-weight:800;letter-spacing:-0.3px}
  .card-subtitle{font-size:12px;color:var(--muted);margin-top:1px}

  /* ===== STATUS BADGES ===== */
  .badge{
    display:inline-flex;align-items:center;gap:4px;
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;
    padding:3px 8px;border-radius:20px;white-space:nowrap;
  }
  .badge-good{background:var(--good-bg);color:var(--good);border:1px solid rgba(74,222,128,0.2)}
  .badge-warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(251,191,36,0.2)}
  .badge-bad{background:var(--bad-bg);color:var(--bad);border:1px solid rgba(248,113,113,0.2)}
  .badge-info{background:var(--info-bg);color:var(--info);border:1px solid rgba(96,165,250,0.2)}
  .badge-violet{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(167,139,250,0.2)}

  /* ===== SECTION LABELS ===== */
  .section-lbl{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);margin:16px 0 8px;padding-left:2px;
  }

  /* ===== INFO ROWS ===== */
  .info-row{
    display:flex;align-items:center;gap:12px;padding:10px 0;
    border-bottom:1px solid rgba(37,53,84,0.5);
  }
  .info-row:last-child{border-bottom:none}
  .info-icon{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;background:var(--panel2);flex-shrink:0;
  }
  .info-content{flex:1;min-width:0}
  .info-label{font-size:11px;color:var(--muted);font-weight:500}
  .info-value{font-size:14px;font-weight:600;color:var(--txt);margin-top:1px}
  .info-right{text-align:right;flex-shrink:0}

  /* ===== QUOTE CARD ===== */
  .quote-card{
    background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:16px;margin:10px 0;
    position:relative;overflow:hidden;
  }
  .quote-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:var(--accent);
  }
  .quote-big{
    font-size:32px;font-weight:800;letter-spacing:-1px;color:var(--accent);
    margin:4px 0;
  }
  .range-wrap{margin:10px 0}
  input[type=range]{
    width:100%;height:8px;border-radius:4px;
    -webkit-appearance:none;appearance:none;
    background:var(--panel3);outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:var(--accent);border:3px solid var(--panel2);
    box-shadow:0 2px 8px rgba(244,132,95,0.4);cursor:pointer;
    transition:transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:active{transform:scale(1.2)}
  input[type=range]::-moz-range-thumb{
    width:22px;height:22px;border-radius:50%;
    background:var(--accent);border:3px solid var(--panel2);
    box-shadow:0 2px 8px rgba(244,132,95,0.4);cursor:pointer;
  }

  /* ===== BUTTONS ===== */
  .btn-row{display:flex;gap:10px;margin-top:14px}
  .btn{
    flex:1;border:none;border-radius:var(--radius-sm);padding:14px 8px;
    font-size:14px;font-weight:700;cursor:pointer;text-align:center;
    transition:all 0.15s;user-select:none;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn:active{transform:scale(0.97)}
  .btn-primary{background:var(--accent);color:#1a0f08}
  .btn-primary:hover{background:var(--accent2)}
  .btn-success{background:var(--good);color:#0a1f0f}
  .btn-danger{background:rgba(248,113,113,0.15);color:var(--bad);border:1px solid rgba(248,113,113,0.25)}
  .btn-ghost{background:var(--panel3);color:var(--txt2);border:1px solid var(--line)}
  .btn-violet{background:var(--violet);color:#140b2e}
  .btn-warn{background:var(--warn);color:#2a1f08}
  .btn:disabled{opacity:0.35;cursor:default;transform:none}

  /* ===== SEGMENTED CONTROL ===== */
  .seg{display:flex;gap:4px;background:var(--panel3);padding:4px;border-radius:var(--radius-xs)}
  .seg-btn{
    flex:1;border:none;border-radius:8px;padding:10px 4px;
    font-size:12px;font-weight:600;color:var(--muted);
    background:transparent;cursor:pointer;text-align:center;
    transition:all 0.15s;
  }
  .seg-btn.on{background:var(--accent);color:#1a0f08;font-weight:700}
  .seg-btn .seg-sub{display:block;font-size:9px;color:inherit;opacity:0.6;margin-top:1px}

  /* ===== TACTIC BUTTONS ===== */
  .tactics{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap}
  .tactic{
    flex:1;min-width:80px;border:1px solid var(--line);border-radius:var(--radius-xs);
    padding:10px 8px;font-size:12px;font-weight:600;color:var(--txt2);
    background:var(--panel2);cursor:pointer;text-align:center;
    transition:all 0.15s;
  }
  .tactic:active{transform:scale(0.96)}
  .tactic:disabled{opacity:0.3;cursor:default;transform:none}
  .tactic.used{opacity:0.35;text-decoration:line-through}

  /* ===== AGENT CARDS ===== */
  .agent-card{
    background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;
    position:relative;transition:border-color 0.2s;
  }
  .agent-card.selected{border-color:var(--violet);box-shadow:0 0 0 1px var(--violet)}
  .agent-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .agent-avatar{
    width:40px;height:40px;border-radius:var(--radius-xs);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;background:var(--panel3);flex-shrink:0;
  }
  .agent-name{font-weight:700;font-size:15px}
  .agent-type{font-size:11px;color:var(--muted)}
  .agent-rel{margin-left:auto;text-align:right}
  .rel-bar{
    height:4px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:4px;width:60px;margin-left:auto;
  }
  .rel-bar>i{display:block;height:100%;border-radius:4px;transition:width 0.3s}
  .rel-bar>i.good{background:var(--good)}
  .rel-bar>i.mid{background:var(--warn)}
  .rel-bar>i.bad{background:var(--bad)}

  .agent-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .agent-stat{font-size:11px;color:var(--muted)}
  .agent-stat b{color:var(--txt);font-weight:600}
  .agent-price-row{display:flex;align-items:center;justify-content:space-between}
  .agent-price{font-size:22px;font-weight:800;color:var(--violet)}
  .agent-savings{font-size:11px;color:var(--good);font-weight:600}
  .agent-loss{font-size:11px;color:var(--bad);font-weight:600}

  /* ===== MESSAGES / STORY ===== */
  .story{
    background:var(--panel2);border-left:3px solid var(--accent);
    border-radius:0 var(--radius-xs) var(--radius-xs) 0;
    padding:12px 14px;font-size:13.5px;font-style:italic;
    color:var(--txt2);line-height:1.5;margin:10px 0;
  }
  .story.violet{border-color:var(--violet)}
  .story.good{border-color:var(--good)}
  .story.bad{border-color:var(--bad)}
  .story.warn{border-color:var(--warn)}

  .motiv{font-size:12px;color:var(--warn);margin-top:6px;font-style:normal;font-weight:500}
  .motiv::before{content:"🎯 "}

  .note{
    display:flex;gap:8px;align-items:flex-start;
    background:var(--panel2);border-radius:var(--radius-xs);
    padding:10px 12px;margin:8px 0;font-size:12px;color:var(--muted);
  }
  .note .note-icon{flex-shrink:0;font-size:14px;margin-top:1px}

  /* ===== ANALYSIS ===== */
  .analysis{display:flex;flex-direction:column;gap:6px;margin:10px 0}
  .an-row{display:flex;align-items:center;gap:8px;font-size:13px}
  .an-emoji{font-size:16px;flex-shrink:0;width:24px;text-align:center}
  .an-label{font-weight:600}
  .an-detail{color:var(--muted);font-size:12px}

  /* ===== DUAL STAT BOXES ===== */
  .duo{display:flex;gap:8px;margin:10px 0}
  .duo-box{
    flex:1;background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-xs);padding:12px;text-align:center;
  }
  .duo-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
  .duo-value{font-size:20px;font-weight:800;margin-top:3px}

  /* ===== SUMMARY ROW ===== */
  .summary{
    display:flex;align-items:center;justify-content:space-around;gap:4px;
    background:var(--panel2);border-radius:var(--radius-sm);padding:14px 10px;
    margin:10px 0;text-align:center;
  }
  .summary-col{flex:1}
  .summary-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
  .summary-value{font-size:16px;font-weight:800;display:block;margin-top:2px}
  .summary-op{font-size:14px;color:var(--muted);font-weight:300}

  /* ===== LOG ===== */
  /* Notificaciones tipo "toast": esquina inferior izquierda, angostas,
     NO bloquean los clics (pointer-events:none) y se desvanecen solas. */
  .log{
    position:fixed;bottom:66px;left:10px;z-index:90;
    width:min(66%,250px);font-size:11px;
    display:flex;flex-direction:column;justify-content:flex-end;
    pointer-events:none;background:none;border:none;padding:0;
  }
  .log div{
    background:rgba(7,11,20,0.92);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:var(--radius-xs);
    padding:6px 9px;margin-top:5px;color:var(--txt2);
    box-shadow:var(--shadow);animation:toastIn .25s ease;
  }
  @keyframes toastIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
  @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-14px)}}

  /* ===== OPS LIST ===== */
  .ops-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 0;border-bottom:1px solid rgba(37,53,84,0.4);
  }
  .ops-row:last-child{border-bottom:none}
  .ops-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .ops-co{flex:1;min-width:0}
  .ops-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ops-sub{font-size:10px;color:var(--muted)}
  .ops-amt{text-align:right;flex-shrink:0}
  .ops-amt-val{font-weight:700;font-size:13px}
  .ops-amt-when{font-size:10px;color:var(--muted)}

  /* ===== CENTERED STATES ===== */
  .center{text-align:center}
  .big{font-size:26px;font-weight:800;margin:6px 0;letter-spacing:-0.5px}
  .tip{color:var(--muted);font-size:12px;margin-top:8px;line-height:1.5}

  /* ===== HUB PANEL ===== */
  .hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
  .hub-card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:16px 10px;text-align:center;
    cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;
  }
  .hub-card:active{transform:scale(0.97)}
  .hub-card .hub-emoji{font-size:28px;margin-bottom:6px;display:block}
  .hub-card .hub-title{font-size:13px;font-weight:700;margin-bottom:2px}
  .hub-card .hub-desc{font-size:10px;color:var(--muted);line-height:1.3}
  .hub-card .hub-badge{
    position:absolute;top:6px;right:6px;background:var(--bad);
    color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 6px;
  }
  .hub-card .hub-badge.good{background:var(--good);color:#0a1f0f}
  .hub-card .hub-badge.info{background:var(--info)}
  .hub-card .hub-badge.violet{background:var(--violet)}

  .hub-action{
    display:flex;align-items:center;gap:12px;
    background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;
    cursor:pointer;transition:all 0.15s;
  }
  .hub-action:active{transform:scale(0.98)}
  .hub-action .ha-icon{font-size:24px;flex-shrink:0}
  .hub-action .ha-content{flex:1}
  .hub-action .ha-title{font-weight:700;font-size:14px}
  .hub-action .ha-desc{font-size:11px;color:var(--muted);margin-top:1px}
  .hub-action .ha-arrow{font-size:14px;color:var(--muted);flex-shrink:0}

  .pulse{animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}

  /* ===== SWIPE HINT ===== */
  .swipe-hint{
    text-align:center;font-size:10px;color:var(--muted2);
    padding:4px 0 2px;letter-spacing:0.3px;
  }

  /* ===== MODALS ===== */
  .modal{
    position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;
    display:flex;align-items:center;justify-content:center;padding:16px;
    overflow-y:auto;animation:fadeIn 0.2s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal-box{
    background:var(--panel);border:1px solid var(--line2);
    border-radius:var(--radius);max-width:480px;width:100%;
    max-height:85vh;overflow-y:auto;padding:22px;
    box-shadow:var(--shadow-lg);animation:slideUp 0.25s ease;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
  .modal-title{color:var(--accent);font-size:18px;font-weight:800;margin-bottom:8px}
  .modal-sub{color:var(--info);font-size:14px;font-weight:700;margin:14px 0 6px}
  .modal-close{
    background:var(--accent);color:#1a0f08;border:none;border-radius:var(--radius-sm);
    padding:13px;font-weight:700;cursor:pointer;width:100%;margin-top:14px;font-size:14px;
  }
  .modal-close.ghost{background:var(--panel3);color:var(--txt2);margin-top:8px}

  .rating{display:flex;gap:10px;justify-content:center;margin:12px 0}
  .star{cursor:pointer;font-size:30px;color:var(--muted2);transition:color 0.15s}
  .star.on{color:var(--warn)}
  .fb-input{
    width:100%;background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-xs);padding:10px 12px;color:var(--txt);
    font-family:inherit;font-size:14px;margin:6px 0;
  }
  .fb-input:focus{outline:none;border-color:var(--accent)}

  /* ===== SCORES ===== */
  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
  .score-cell{
    background:var(--panel2);border-radius:var(--radius-xs);
    padding:10px;text-align:center;
  }
  .score-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
  .score-value{font-size:18px;font-weight:800;margin-top:2px}

  /* ===== ANIMATIONS ===== */
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

<script>
/* ════════════════════════════════════════════════════════════════════════
   FREIGHT FORWARDER — "El Escritorio"  ·  v4 (Swipe UI Redesign)
   Layout: [AGENTES] ← [HUB] → [CLIENTES]

const $=id=>document.getElementById(id);
const clamp=(n,min,max)=>Math.max(min,Math.min(max,n));
const clamp01=x=>clamp(x,0,1);
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const money=n=>"$"+Math.round(n).toLocaleString("es-AR");
const shortMoney=n=>{

// ═══════════════════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════════════════

const PERSONAS={

const CARGOS=[
  {co:"Bodega Los Andes",op:"Exportacion",merc:"Vinos (reefer)",desc:"3x40'HC",ruta:"Mendoza → Miami",modo:"maritimo",base:5200,urgente:false,
   historia:"¡Somos una empresa de vinos, hacemos los mejores de Mendoza! El mes pasado nos pidieron muchísimo de Italia… ¡Italia, imaginate! En fin, esta vez le mandamos 3 contenedores a Estados Unidos. Eso sí: necesitan control de temperatura, ¿ustedes hacen ese tipo de trabajo? ¡Excelente! Entonces te pido por favor una cotización. ¡Gracias!",motivo:"Que el vino llegue impecable a su nuevo comprador."},
  {co:"Minera Cerro Grande",op:"Importacion",merc:"Repuestos criticos",desc:"850 kg",ruta:"Santiago → Lima",modo:"aereo",base:4500,urgente:true,

  {co:"AgroServicios SRL",op:"Importacion",merc:"Cosechadora 12,5 t",desc:"Sobredimensionada",ruta:"Cordoba → Rio Cuarto",modo:"terrestre",base:2835,urgente:false,
   historia:"Me compré la cosechadora más grande de mi vida, una bestia. La necesito en el campo antes de que arranque la cosecha. Pero te soy honesto: no me sobra un peso y ya tengo otra cotización más barata. Convenceme.",motivo:"Llegar a la cosecha sin fundirse en el flete."},

   historia:"Traigo muebles italianos para un showroom que inauguro en seis semanas. Estas piezas son EL centro de la muestra, no puede pasarles nada. Busco un servicio premium, de primera… el precio más barato no me interesa, me interesa que lleguen perfectas.",motivo:"Que las piezas lleguen impecables y a tiempo."},
  {co:"Flores del Valle",op:"Exportacion",merc:"Rosas (cadena de frio)",desc:"1.800 kg",ruta:"Medellin → Miami",modo:"aereo",base:2900,urgente:true,
   historia:"Exportamos rosas dos veces por semana, y esto es delicado: si se corta la cadena de frío aunque sea un rato, la carga entera es basura. Pérdida total. Necesito que me garantices el frío de punta a punta.",motivo:"Que la flor llegue fresca, sí o sí."},
  {co:"TechSur S.A.",op:"Importacion",merc:"Electronica",desc:"2x40'HC",ruta:"Shanghai → Buenos Aires",modo:"maritimo",base:5600,urgente:false,
   historia:"Buenas. Necesitamos importar esta carga de electrónica, es una operación importante para nosotros. Te aviso de una: estamos pidiendo cotización a varios forwarders, así que tirame tu mejor propuesta y vemos.",motivo:"La mejor relación precio/servicio del mercado."},
  {co:"Pesquera Austral",op:"Exportacion",merc:"Langostinos premium",desc:"900 kg",ruta:"Trelew → Madrid",modo:"aereo",base:3400,urgente:true,
   historia:"Le mandamos langostino premium a un restaurante de Madrid que paga por la frescura, no por otra cosa. Si la carga demora, el producto pierde valor y yo pierdo al cliente. Acá la velocidad lo es todo.",motivo:"Mantener al comprador exigente de Madrid."},
  {co:"Importadora Norte",op:"Importacion",merc:"Repuestos de auto",desc:"1x40'",ruta:"Busan → Valparaiso",modo:"maritimo",base:2600,urgente:false,
   historia:"Traigo repuestos todos los meses, así que conozco los números de este rubro mejor que vos, te lo digo de una. No me vas a vender humo: quiero pagar lo justo y ni un peso más.",motivo:"Pagar exactamente lo que vale, nada más."},
];

const AGENTES=[
  {id:"oceanlink",nombre:"OceanLink",emoji:"🚢",tipo:"Flexible",modo:"maritimo",markup:1.06,conf:88,flex:0.09,plazoMax:30,transit:35,validez:7,desc:"Negocia bien, da credito."},
  {id:"asiacargo",nombre:"Asia Cargo",emoji:"🚢",tipo:"Agresivo",modo:"maritimo",markup:0.95,conf:62,flex:0.05,plazoMax:15,transit:46,validez:5,desc:"Muy barato, pero mas problemas."},
  {id:"bluesea",nombre:"BlueSea",emoji:"🚢",tipo:"Premium",modo:"maritimo",markup:1.17,conf:97,flex:0.03,plazoMax:30,transit:31,validez:10,desc:"Caro, maxima confiabilidad."},
  {id:"pampa",nombre:"Pampa Log.",emoji:"🚚",tipo:"Amigo",modo:"terrestre",markup:1.03,conf:86,flex:0.11,plazoMax:45,transit:3,validez:7,desc:"Te financia y te salva."},
  {id:"rutasur",nombre:"RutaSur",emoji:"🚚",tipo:"Agresivo",modo:"terrestre",markup:0.96,conf:64,flex:0.06,plazoMax:15,transit:4,validez:4,desc:"Barato, algo riesgoso."},
  {id:"transandina",nombre:"TransAndina",emoji:"🚚",tipo:"Premium",modo:"terrestre",markup:1.13,conf:95,flex:0.04,plazoMax:30,transit:3,validez:10,desc:"Caro, muy seguro."},
  {id:"skybridge",nombre:"SkyBridge Air",emoji:"✈️",tipo:"Flexible",modo:"aereo",markup:1.05,conf:90,flex:0.08,plazoMax:15,transit:3,validez:4,desc:"Aereo flexible."},
  {id:"andesair",nombre:"Andes Air",emoji:"✈️",tipo:"Premium",modo:"aereo",markup:1.18,conf:98,flex:0.03,plazoMax:30,transit:2,validez:7,desc:"Aereo premium, carisimo."},
];

const FRASES={
  caro:["Tu precio esta muy arriba.","Tengo ofertas mas competitivas.","¿Es tu mejor precio?"],
  compara:["Otra empresa me paso mas barato.","Estoy evaluando opciones.","Convenceme de elegirte."],
  apura:["Necesito respuesta hoy.","La carga sale esta semana.","Cada dia me cuesta plata."],
  cerca:["Estamos cerca.","Solo una pequena mejora.","Si resolves esto, avanzamos."],
};

const LOSE={
  competidor:"Me fui con otro forwarder, me hizo mejor numero.",
  negocio:"A ese precio no me cierra el negocio. No hago la operacion.",
  paciencia:"Me canse de dar vueltas. Lo dejo aca.",
  enojo:"Asi no se puede negociar. Chau."
};

// ── TÁCTICAS: catálogo (3 de venta + 3 de compra) ──────────────────────
const PRIZE_EVERY=3;   // cada cuántas cargas cerradas ganás una táctica nueva
const TACTIC_NAMES={tiempo:"Presión de tiempo",valor:"Argumento de valor",anticipo:"Pago anticipado",
                    farol:"Farol",volumen:"Prometer volumen",prioridad:"Pedir prioridad"};
const TACTIC_EMOJI={tiempo:"⏱️",valor:"⭐",anticipo:"💵",farol:"🃏",volumen:"📦",prioridad:"⚡"};
const TACTIC_SIDE ={tiempo:"venta",valor:"venta",anticipo:"venta",farol:"compra",volumen:"compra",prioridad:"compra"};
const TACTIC_KEYS =["tiempo","valor","anticipo","farol","volumen","prioridad"];

// ═══════════════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════════════

let G;
let feedbackTimeout=null, feedbackShown=false;
let currentPanel=1; // 0=agentes, 1=hub, 2=clientes
let activePanel=1;

function newGame(){
  G={
    cash:6000,rep:0,day:1,deals:0,lost:0,problems:0,
    nextMonthly:30,monthly:1500,
    ops:[],capacity:4,over:false,overReason:"",
    st:null,
    tierMsg:0,supplierTerm:15,
    agentUi:"lista",aneg:null,
    startTime:Date.now(),
    rel:{}, incidents:[], _needNew:false,
    // Inventario de tácticas: arrancás con 1 de cada una (3 de venta + 3 de compra).
    // Usar una gasta 1. Cada PRIZE_EVERY cargas cerradas ganás una más.
    inv:{tiempo:1,valor:1,anticipo:1,farol:1,volumen:1,prioridad:1},
    lastPrizeAt:0,
    // Memoria por agente: cuántas veces le hiciste bajar la tarifa y NO cerraste.
    // Si se acumula, el agente se cansa y deja de bajar. Se resetea al cerrar con él.
    haggleFail:{}, hagglePend:false
  };
  AGENTES.forEach(a=>G.haggleFail[a.id]=0);
  AGENTES.forEach(a=>G.rel[a.id]=50);   // relación con agentes: sigue siendo 0..100 (aparte de la reputación)
  feedbackShown=false;
  if(feedbackTimeout) clearTimeout(feedbackTimeout);
  feedbackTimeout=setTimeout(()=>{ if(!G.over&&!feedbackShown) showFeedbackModal(); },120000);  // opinión a los 2 min
  log("Arrancas solo con "+money(G.cash)+". Gastos del mes: "+money(G.monthly)+".");
  newClient();
  renderAll();
}

function newClient(){
  G.hagglePend=false;   // nueva carga: arranca sin regateo pendiente
  const persona=pick(Object.values(PERSONAS));
  const base=pick(CARGOS);
  const scale=1+(G.rep-50)/120;
  let marketBase=Math.round(base.base*scale*rnd(0.9,1.15));
  let market="normal",flavor="";
  const r=Math.random();
  if(r<0.18){market="barata";marketBase=Math.round(marketBase*0.80);flavor="🟢 Mercado en baja: vas a conseguir tarifas buenas con los agentes.";}
  else if(r<0.40){market="cara";marketBase=Math.round(marketBase*1.26);flavor="🔴 Temporada alta: las tarifas estan caras en todos los agentes.";}
  let viableMult = market==="cara"?rnd(1.10,1.30):rnd(1.16,1.50);
  if(Math.random()<0.12) viableMult=rnd(1.04,1.12);

  G.st={
    persona,
    cargo:{...base, marketBase, market, viableMult,
      costo:null, agentId:null, conf:null, transit:null,
      agentTerm:G.supplierTerm, prioridad:false,
      clientMaxViable:null, unwinnable:false},
    flavor, price:null, term:persona.prefTerm===0?0:30,
    transport:base.modo, round:0, anger:0,
    satisfaction:Math.max(15,Math.min(85,40+Math.round((G.rep-50)*0.4))),
    revealed:[], tactics:{tiempo:false,valor:false,anticipo:false},
    tacticBonus:0, counter:null, counterTerm:null,
    clientMsg:base.historia, finished:false, targetAsked:false, targetKnown:null
  };
  buildOffers();
}

function buildOffers(){
  const c=G.st.cargo;
  const elegibles=AGENTES.filter(a=>a.modo===c.modo);
  const roster=elegibles.length?elegibles:AGENTES.filter(a=>a.modo==="maritimo");
  G.st.offers=roster.slice(0,3).map(a=>{
    const rel=G.rel[a.id]??50;
    const relMod=1+(60-rel)/300;
    const price=Math.round(c.marketBase*a.markup*relMod*rnd(0.97,1.04));
    return {agentId:a.id, price, floor:Math.round(c.marketBase*(a.markup-a.flex*2)),
            transit:a.transit+Math.round(rnd(-2,3)), validez:a.validez, conf:a.conf};
  });
}
function agentById(id){return AGENTES.find(a=>a.id===id);}

// ═══════════════════════════════════════════════════════════════════════
//  NEGOTIATION LOGIC (CLIENT)
// ═══════════════════════════════════════════════════════════════════════

function acceptance(){
  const st=G.st,p=st.persona,costo=st.cargo.costo;
  if(!costo)return 0;
  const target=costo*p.targetMult;
  if(st.price>st.cargo.clientMaxViable) return 0.01;
  let acc=0.25;
  if(st.price<=target) acc+=0.30*(1-st.price/target);
  else acc-=(p.priceSens/100)*Math.min((st.price-target)/target,0.5)*1.2;
  acc+=(st.term/60)*0.10;
  acc-=Math.abs(st.term-p.prefTerm)/60*0.12;
  if(st.cargo.modo==="aereo") acc+=p.urgency>60?0.16:-0.08;
  if(st.cargo.prioridad && p.urgency>60) acc+=0.10;
  acc+=(st.satisfaction/100)*0.15;
  acc-=st.anger*0.04;
  acc+=st.tacticBonus;
  return clamp01(acc);
}

function estimateRisk(st){
  const m=(st.price-st.cargo.costo)/st.cargo.costo;
  let ops=0.06;
  if(m<0.15) ops+=0.18;
  else if(m<0.22) ops+=0.08;
  ops+=st.persona.key==="rata"?0.10:st.persona.key==="apurado"?0.05:-0.03;
  if(st.cargo.urgente) ops+=0.08;
  ops+=(1-st.satisfaction/100)*0.08;
  ops+=(1-(st.cargo.conf??90)/100)*0.30;
  if(st.cargo.prioridad) ops-=0.06;
  ops=clamp01(Math.max(0.02,ops));
  let pay=st.term>0?(st.persona.key==="rata"?0.13:0.04)*(0.5+st.term/60):0;
  return {ops,pay:clamp01(pay),total:clamp01(ops+clamp01(pay))};
}

function nextTerm(t){const L=[0,15,30,45,60];const i=L.indexOf(t);return i<0?15:L[Math.min(i+1,L.length-1)];}

function sendQuote(){
  const st=G.st;
  if(st.finished)return;
  st.round++;
  if(st.price>st.cargo.clientMaxViable){
    st.counter=null;st.counterTerm=null;st.clientMsg=LOSE.negocio;
    revealHint();
    if(st.round>=st.persona.maxRounds)return loseDeal(LOSE.paciencia);
    renderAll();return;
  }
  const acc=acceptance();
  if(Math.random()<acc)return closeDeal();
  if(st.round>=st.persona.maxRounds){
    if(Math.random()<acc*0.6)return closeDeal();
    return loseDeal(LOSE.competidor);
  }
  const floor=st.cargo.costo*1.10,target=st.cargo.costo*st.persona.targetMult;
  st.counter=null;st.counterTerm=null;
  if(st.price>target){
    const cp=Math.round(Math.max(floor,target,st.price*(1-st.persona.concession)));
    if(cp<st.price&&cp<=st.cargo.clientMaxViable)st.counter=cp;
  }
  if(st.counter===null&&st.term<st.persona.prefTerm)st.counterTerm=Math.min(st.persona.prefTerm,nextTerm(st.term));
  let pool=acc>0.45?FRASES.cerca:st.persona.urgency>60?FRASES.apura:FRASES.compara;
  let pedido=st.counter?" Te lo tomo a "+money(st.counter)+".":st.counterTerm!=null?" El precio me cierra, pero pagame a "+st.counterTerm+" dias.":"";
  st.clientMsg="“"+pick(pool)+pedido+"”";
  revealHint();
  if(st.anger>=st.persona.angerThreshold)return loseDeal(LOSE.enojo);
  renderAll();
}

function acceptCounter(){
  const st=G.st;
  if(st.finished||(st.counter==null&&st.counterTerm==null))return;
  if(st.counter!=null)st.price=st.counter;
  if(st.counterTerm!=null)st.term=st.counterTerm;
  closeDeal();
}

function useTactic(t){
  const st=G.st,p=st.persona;
  if(st.finished||st.tactics[t])return;          // 1 vez por trato
  if((G.inv[t]||0)<=0){ flash("No te quedan tácticas de «"+TACTIC_NAMES[t]+"». Cerrá cargas para ganar más."); return; }
  G.inv[t]--;                                    // gasta una del inventario
  st.tactics[t]=true;
  if(t==="tiempo"){
    if(p.urgency>60){st.tacticBonus+=0.18;flash("Presion de tiempo: le pico la urgencia.");}
    else{st.tacticBonus-=0.12;st.anger++;flash("Presion de tiempo: no tenia apuro, se MOLESTO.");}
  }
  if(t==="valor"){
    if(p.serviceVal>50){st.tacticBonus+=0.15;st.satisfaction=Math.min(100,st.satisfaction+8);flash("Argumento de valor: lo valoro.");}
    else flash("Argumento de valor: a este cliente le importa el numero, no sirvio.");
  }
  if(t==="anticipo"){
    const floor=st.cargo.costo*1.10,nuevo=Math.max(floor,Math.round(st.price*0.92));
    const bajo=st.price-nuevo;
    st.price=nuevo;st.term=0;st.tacticBonus+=0.10;
    flash("Pago anticipado: das "+money(bajo)+" de descuento a cambio de cobrar ya.");
  }
  renderAll();
}

// El jugador decide ABANDONAR la carga (incluso ya teniendo tarifa).
// Es una salida digna: penaliza poco la fama. Si había agente reservado, se enfría un poco.
function declineClient(){
  if(G.st.finished) return;
  const frases=["Lo lamento, esta vez no llego con el número.","No te puedo ayudar en esta operación, disculpá.","Prefiero no tomar esta carga, no me cierra.","Te quedo debiendo esta; ahora no puedo."];
  G.lost++;
  if(G.st.cargo.agentId){
    G.rel[G.st.cargo.agentId]=Math.max(0,G.rel[G.st.cargo.agentId]-3);
    log("Soltaste la tarifa de "+agentById(G.st.cargo.agentId).nombre+": quedó algo molesto.");
  }
  registrarRegateoFallido();        // si le hiciste bajar y no cerraste, lo recuerda
  G.st.finished=true;
  addRep(-1);                       // abandonar a tiempo cuesta menos que fallar una entrega
  G.st.clientMsg=pick(frases);
  log("🙇 Dejaste pasar a "+G.st.cargo.co+". (reputación -1)");
  goPanel(2);                       // mostrar la pantalla de cliente (queda en "perdido")
  renderAll();
}

// Preguntarle al cliente cuánto está dispuesto a pagar (su "target").
// Casi nunca lo dice; si no, puede molestarse y bajarte la reputación.
function askTarget(){
  const st=G.st; if(st.finished||st.targetAsked) return;
  st.targetAsked=true;
  const p=st.persona;
  // Probabilidad de que afloje el número: el Confiable un poco más, el Rata casi nunca.
  const tellChance = p.key==="confiable"?0.35 : p.key==="rata"?0.12 : 0.22;
  if(Math.random()<tellChance){
    // Te da una idea (un poco por debajo de su techo real, para que igual tengas que ajustar).
    st.targetKnown=Math.round(st.cargo.clientMaxViable*rnd(0.90,0.98));
    st.clientMsg="“Mirá, te soy sincero: yo manejaba un número cercano a "+money(st.targetKnown)+". Si te acercás, cerramos.”";
    flash("El cliente te soltó su target (~"+money(st.targetKnown)+").");
  }else if(Math.random()<0.5){
    // Se molesta: no le gustó que le preguntes.
    st.anger++; addRep(-2);
    st.clientMsg="“No te voy a decir cuánto tengo, pasame TU precio. No me gusta esta jugada.”";
    flash("Al cliente le molestó la pregunta. (reputación -2)");
  }else{
    // Simplemente esquiva.
    st.clientMsg="“No tengo un número fijo, mandame tu mejor propuesta y vemos.”";
    flash("El cliente esquivó la pregunta del target.");
  }
  renderAll();
}

function rejectClient(){
  if(!G.st.finished){
    G.lost++;
    if(G.st.cargo.agentId){
      G.rel[G.st.cargo.agentId]=Math.max(0,G.rel[G.st.cargo.agentId]-3);
      log("Rechazaste tras reservar tarifa: "+agentById(G.st.cargo.agentId).nombre+" quedo molesto.");
    }
    log("Pasaste a "+G.st.cargo.co+".");
    nextOrEnd();
  }
}

function closeDeal(){
  const st=G.st;
  st.finished=true;
  st.dealClosed=true;
  const m=(st.price-st.cargo.costo)/st.cargo.costo;
  G.deals++;
  const risk=estimateRisk(st);
  const payDay=G.day+st.term+Math.round(rnd(0,3));
  const costDay=G.day+Math.min(st.cargo.agentTerm,st.term||999);
  if(st.cargo.agentId){
    G.rel[st.cargo.agentId]=Math.min(100,G.rel[st.cargo.agentId]+2);
    G.haggleFail[st.cargo.agentId]=0;   // cerraste: el agente te perdona los regateos previos
  }
  G.hagglePend=false;
  G.ops.push({co:st.cargo.co,price:st.price,costo:st.cargo.costo,risk,payDay,costDay,costPaid:false,agentId:st.cargo.agentId});
  log("✅ Cerraste "+st.cargo.co+" a "+money(st.price)+" (margen "+Math.round(m*100)+"%). Cobras en "+st.term+"d.");
  renderAll();
}

function loseDeal(msg){
  const st=G.st;
  st.finished=true;
  G.lost++;
  registrarRegateoFallido();        // si regateaste con el agente y no cerraste, lo recuerda
  // Una carga que NO cerraste pesa poco en tu fama (pero suma si se repite).
  addRep(-2);
  st.clientMsg=msg;
  log("❌ Perdiste a "+st.cargo.co+". (reputación -2)");
  renderAll();
}

// Si en esta operación le pediste rebaja a un agente y NO cerraste, el agente
// lo recuerda: a la 2da/3ra vez deja de bajarte la tarifa.
function registrarRegateoFallido(){
  const id=G.st.cargo.agentId;
  if(G.hagglePend && id){
    G.haggleFail[id]=(G.haggleFail[id]||0)+1;
    if(G.haggleFail[id]>=2) log(agentById(id).nombre+" ya no te va a bajar la tarifa fácil: le hiciste perder tiempo.");
  }
  G.hagglePend=false;
}

function openAgentNeg(agentId){
  const off=G.st.offers.find(o=>o.agentId===agentId),a=agentById(agentId);
  G.aneg={
    agentId,offer:off.price,floor:off.floor,round:0,
    transit:off.transit,validez:off.validez,conf:off.conf,
    plazo:Math.min(G.supplierTerm,a.plazoMax),prioridad:false,
    tactics:{farol:false,volumen:false,prioridad:false},
    msg:"Para "+G.st.cargo.ruta+": "+money(off.price)+". Validez "+off.validez+" dias."
  };
  G.agentUi="negociar";
  goPanel(0);
  renderAll();
}

// Frases de un agente que se cansó de que le pidas y no cierres.
const AGENT_TIRED=["No puedo bajar más, ya estoy al límite.","Voy a pérdida con ese número, imaginate si bajo más.","Pregunté a gerencia y no me dieron el visto bueno.","Ya te bajé varias veces y no cerramos… así no puedo.","Es mi piso, de acá no me muevo."];

function agentDescuento(){
  const an=G.aneg,a=agentById(an.agentId);
  G.hagglePend=true;                       // pediste rebaja en esta negociación
  // Si ya te cansó de regatear sin cerrar, NO baja más (memoria entre negociaciones).
  if((G.haggleFail[an.agentId]||0)>=2){
    an.msg=pick(AGENT_TIRED);
    renderAll();return;
  }
  if(an.round>=3){
    an.msg="Ya te di mi mejor número, "+a.nombre.split(' ')[0]+" no baja más.";
    G.rel[an.agentId]=Math.max(0,G.rel[an.agentId]-2);
    renderAll();return;
  }
  an.round++;
  const nuevo=Math.max(an.floor,Math.round(an.offer*(1-a.flex)));
  if(nuevo<an.offer){
    an.offer=nuevo;
    an.msg="Puedo llegar a "+money(nuevo)+". Es un esfuerzo.";
    G.rel[an.agentId]=Math.max(0,G.rel[an.agentId]-1);
  }else{
    an.msg=pick(AGENT_TIRED);
    G.rel[an.agentId]=Math.max(0,G.rel[an.agentId]-2);
  }
  renderAll();
}

function agentTactic(t){
  const an=G.aneg,a=agentById(an.agentId);
  if(an.tactics[t])return;                        // 1 vez por negociación
  if((G.inv[t]||0)<=0){ flash("No te quedan tácticas de «"+TACTIC_NAMES[t]+"». Cerrá cargas para ganar más."); return; }
  G.inv[t]--;                                     // gasta una del inventario
  an.tactics[t]=true;
  if(t==="farol"){
    if(Math.random()<0.45+a.flex){
      const nuevo=Math.max(an.floor,Math.round(an.offer*(1-a.flex*1.8)));
      an.offer=nuevo;
      an.msg="Mmm... no quiero perder la carga. Te lo dejo en "+money(nuevo)+".";
      flash("Farol exitoso con "+a.nombre+".");
    }else{
      G.rel[an.agentId]=Math.max(0,G.rel[an.agentId]-8);
      an.msg="Anda con ese otro entonces. Mi precio es ese.";
      flash("El farol no le creyo: la relacion bajo.");
    }
  }
  if(t==="volumen"){
    const nuevo=Math.max(an.floor,Math.round(an.offer*0.94));
    an.offer=nuevo;
    G.rel[an.agentId]=Math.min(100,G.rel[an.agentId]+3);
    an.msg="Si me das volumen, te lo dejo en "+money(nuevo)+". Cuento con vos.";
    flash("Prometiste volumen: mejor precio + relacion.");
  }
  if(t==="prioridad"){
    an.prioridad=true;
    an.offer=Math.round(an.offer*1.08);
    an.msg="Espacio garantizado y salida prioritaria. Suma "+money(Math.round(an.offer-an.offer/1.08))+".";
    flash("Pediste prioridad: +costo, pero asegura el embarque.");
  }
  renderAll();
}

function setAgentPlazo(d){
  const a=agentById(G.aneg.agentId);
  if(d>a.plazoMax){flash(a.nombre+" no te da mas de "+a.plazoMax+"d de credito.");return;}
  G.aneg.plazo=d;
  renderAll();
}

function lockAgent(){
  const an=G.aneg,c=G.st.cargo;
  c.costo=an.offer;c.agentId=an.agentId;c.conf=an.conf;
  c.transit=an.transit;c.agentTerm=an.plazo;c.prioridad=an.prioridad;
  c.clientMaxViable=Math.round(c.costo*c.viableMult);
  c.unwinnable=c.clientMaxViable<Math.round(c.costo*1.10);
  G.st.price=Math.round(c.costo*1.18);
  G.rel[an.agentId]=Math.min(100,G.rel[an.agentId]+1);
  log("📑 Reservaste tarifa con "+agentById(an.agentId).nombre+": "+money(an.offer)+" (pago a "+an.plazo+"d).");
  G.aneg=null;G.agentUi="lista";
  goPanel(2); // auto-ir a clientes
  renderAll();
}

//  OPERATIONS & TICK
// ═══════════════════════════════════════════════════════════════════════

function resolveOps(){
  for(const o of G.ops){
    if(!o.costPaid&&G.day>=o.costDay){
      o.costPaid=true;G.cash-=o.costo;
      log("Pagaste al agente "+money(o.costo)+" ("+o.co+").");
    }
  }
  const due=G.ops.filter(o=>G.day>=o.payDay);
  G.ops=G.ops.filter(o=>G.day<o.payDay);
  for(const o of due){
    if(!o.costPaid){o.costPaid=true;G.cash-=o.costo;}
    if(Math.random()<o.risk.pay){
      // El cliente NO paga: lo peor que te puede pasar. Golpe fuerte a la fama.
      G.problems++;addRep(-10);
      log("🟥 "+o.co+" NO PAGÓ. Perdiste "+money(o.costo)+". (reputación -10)");
    }else if(Math.random()<o.risk.ops){
      // PROBLEMA OPERATIVO: no se resuelve solo. Se encola para que el jugador DECIDA.
      const ex=Math.round((o.price-o.costo)*rnd(0.5,1.4));
      G.incidents.push({co:o.co, price:o.price, costo:o.costo, agentId:o.agentId, extra:ex});
      log("🟧 Problema en "+o.co+": hay que decidir cómo resolverlo.");
    }else{
      // Entrega a tiempo y sin drama: suma reputación de verdad.
      G.cash+=o.price;addRep(3);
      if(o.agentId)G.rel[o.agentId]=Math.min(100,G.rel[o.agentId]+3);
      log("💰 "+o.co+" pagó "+money(o.price)+". Entrega a tiempo. (reputación +3)");
    }
  }
}

// Cambia la reputación dentro del rango -100..100. Si toca -100, se pierde por mala fama.
function addRep(delta){
  G.rep=clamp(G.rep+delta,-100,100);
  if(G.rep<=-100 && !G.over){ G.overReason="reputacion"; gameOver(); }
}
function tick(d){
  G.day+=d;resolveOps();
  while(G.day>=G.nextMonthly){
    G.cash-=G.monthly;
    log("Gastos del mes: -"+money(G.monthly));
    G.monthly=Math.round(G.monthly*1.04);
    G.nextMonthly+=30;
  }
  if(G.rep>=G.tierMsg+10){
    G.tierMsg+=10;
    if(G.supplierTerm<45){G.supplierTerm+=15;log("Reputacion arriba: tus agentes te estiran el credito.");}
    else log("Reputacion arriba: llegan clientes y cargas mas grandes.");
  }
}

function nextOrEnd(){
  tick(Math.round(rnd(2,5)));
  if(G.over) return;
  // Primero incidentes (decisión), después premio de táctica; el cliente nuevo espera.
  if(G.incidents.length){ G._needNew=true; renderAll(); checkIncidents(); return; }
  if(G.cash<0)return gameOver();
  G._needNew=true;
  if(checkTacticPrize()){ renderAll(); return; }   // mostró el premio; al cerrarlo sigue el flujo
  continuarFlujo();
}

function advanceTime(){
  tick(Math.round(rnd(3,7)));
  if(G.over) return;
  renderAll();
  if(G.incidents.length){ checkIncidents(); return; }
  if(G.cash<0)return gameOver();
}

function gameOver(){
  G.over=true;
  if(feedbackTimeout)clearTimeout(feedbackTimeout);
  renderAll();
}

// ── Sonido "clin!" de premio (Web Audio, sin archivos) ─────────────────
let _audioCtx=null;
function playClin(){
  try{
    _audioCtx=_audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_audioCtx, now=ctx.currentTime;
    // dos notas ascendentes tipo campanita
    [[880,0],[1318.5,0.12]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="sine";o.frequency.value=f;
      o.connect(g);g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0001,now+t);
      g.gain.exponentialRampToValueAtTime(0.25,now+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,now+t+0.5);
      o.start(now+t);o.stop(now+t+0.55);
    });
  }catch(e){/* si el navegador bloquea audio, no pasa nada */}
}

// ── Premio de táctica: cada PRIZE_EVERY cargas cerradas ────────────────
// La mitad de las veces te deja elegir; la otra mitad es aleatoria (sorpresa).
function checkTacticPrize(){
  if(G.deals>0 && G.deals-G.lastPrizeAt>=PRIZE_EVERY){
    G.lastPrizeAt=G.deals;
    if(Math.random()<0.5){
      // Aleatoria
      const k=pick(TACTIC_KEYS);
      G.inv[k]=(G.inv[k]||0)+1;
      playClin();
      showPrizeModal(k,false);
    }else{
      // El jugador elige
      showPrizeModal(null,true);
      playClin();
    }
    return true;
  }
  return false;
}
function grantTactic(k){
  G.inv[k]=(G.inv[k]||0)+1;
  const m=document.getElementById('prizeModal'); if(m) m.remove();
  log("🎁 Ganaste una táctica: "+TACTIC_EMOJI[k]+" "+TACTIC_NAMES[k]+" (ahora tenés "+G.inv[k]+").");

function log(t){
  const d=document.createElement("div");
  d.textContent="["+G.day+"] "+t;
  const l=$("log");
  l.prepend(d);
  // mantener máximo 3 toasts visibles
  while(l.children.length>3) l.lastChild.remove();
  // cada toast se desvanece y se borra solo a los ~4.5s
  setTimeout(()=>{
    d.style.animation="toastOut .4s ease forwards";
    setTimeout(()=>d.remove(),400);
  },4500);
}
function words(acc,risk,m){
  const comp=acc>0.6?["😀","Buena posibilidad"]:acc>0.4?["😐","Posible, ajustar"]:["😟","Dificil de cerrar"];
  const rk=risk<0.2?["🛡️","Riesgo bajo"]:risk<0.4?["⚠️","Riesgo medio"]:["🚨","Riesgo alto"];
  const rent=m<0.12?["📉","Margen al limite"]:m<0.25?["📈","Margen aceptable"]:["💎","Margen alto"];
  return {comp,rk,rent};
}
function advice(st,acc,risk,m){
  if(st.price>st.cargo.clientMaxViable)return "A este precio no le cierra el negocio. Baja o pasa.";
  if(acc<0.4&&st.persona.urgency>60)return "Tiene urgencia: la prioridad del agente o el aereo ayudan.";
  if(acc<0.4)return "Esta caro para el cliente. Baja el precio o mejora el plazo.";
  if(m<0.13)return "Margen muy fino: un problema operativo te lo come. Negocia mejor con el agente.";
  if(risk>0.4)return "Riesgo alto: el agente es poco confiable. Pedi contado o cambia de agente.";
  return "Precio equilibrado. Ajusta el plazo para mejorar tu caja.";
}

// ═══════════════════════════════════════════════════════════════════════
//  SWIPE / DRAG NAVIGATION
// ═══════════════════════════════════════════════════════════════════════

let dragStartX=0,dragStartY=0,dragCurrentX=0,isDragging=false;
const panelsEl=$("panels");

function goPanel(n){
  if(n<0||n>2)return;
  activePanel=n;
  updatePanelsPosition();
  updateNavDots();
}

function updatePanelsPosition(){
  panelsEl.style.transform="translateX(-"+(activePanel*33.333)+"%)";
}

function updateNavDots(){
  document.querySelectorAll(".nav-dot").forEach((d,i)=>{
    d.classList.toggle("active",i===activePanel);
  });
}

// ── Navegación por gesto (táctil + mouse), con baja sensibilidad ───────
// Reglas para no robar los toques a los botones:
//  • Si el gesto EMPIEZA sobre un control (botón, slider, etc.) NO se arrastra.
//  • Zona muerta: no se mueve nada hasta recorrer DEAD_ZONE px.
//  • Solo se arrastra si el gesto es claramente HORIZONTAL.
//  • Para cambiar de panel hay que superar SWIPE_THRESHOLD px.
const DEAD_ZONE=24, SWIPE_THRESHOLD=100;
const CONTROL_SEL='button,input,textarea,select,a,.seg-btn,.tactic,.hub-action,.hub-card,.agent-card,.nav-dot,.info-row,.modal';
let gStartX=0,gStartY=0,gDecided=false,gHoriz=false,gActive=false;

function gStart(x,y,target){
  // Si arranca sobre un control o dentro de un modal, no tomamos el gesto de swipe.
  if(target && target.closest && target.closest(CONTROL_SEL)){ gActive=false; return; }
  gStartX=x; gStartY=y; gDecided=false; gHoriz=false; gActive=true;
}
function gMove(x,y){
  if(!gActive) return;
  const dx=x-gStartX, dy=y-gStartY;
  if(!gDecided){
    if(Math.abs(dx)<DEAD_ZONE && Math.abs(dy)<DEAD_ZONE) return;   // dentro de la zona muerta: ignorar
    gDecided=true;
    gHoriz=Math.abs(dx)>Math.abs(dy)*1.8;                          // ¿es un swipe horizontal o un scroll vertical?
    if(gHoriz) panelsEl.classList.add("dragging");
  }
  if(!gHoriz) return;                                              // gesto vertical → dejar scrollear
  const base=-activePanel*33.333, extra=(dx/window.innerWidth)*33.333;
  panelsEl.style.transform="translateX(calc("+base+"% + "+extra+"%))";
}
function gEnd(x){
  if(!gActive){ return; }
  gActive=false; panelsEl.classList.remove("dragging"); panelsEl.style.cursor="";
  if(!gDecided||!gHoriz){ updatePanelsPosition(); return; }        // no fue swipe → no hacer nada
  const dx=x-gStartX;
  if(dx>SWIPE_THRESHOLD && activePanel>0) goPanel(activePanel-1);
  else if(dx<-SWIPE_THRESHOLD && activePanel<2) goPanel(activePanel+1);
  else updatePanelsPosition();
}

// Touch
panelsEl.addEventListener("touchstart",e=>gStart(e.touches[0].clientX,e.touches[0].clientY,e.target),{passive:true});
panelsEl.addEventListener("touchmove", e=>gMove(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
panelsEl.addEventListener("touchend",  e=>gEnd(e.changedTouches[0].clientX),{passive:true});
// Mouse
panelsEl.addEventListener("mousedown",e=>{ gStart(e.clientX,e.clientY,e.target); if(gActive) panelsEl.style.cursor="grabbing"; });
document.addEventListener("mousemove",e=>gMove(e.clientX,e.clientY));
document.addEventListener("mouseup",  e=>gEnd(e.clientX));

function renderHud(){
  if(G.over){$("hud").innerHTML="";$("hud").style.display="none";return;}
  $("hud").style.display="flex";
  const falta=Math.max(0,G.nextMonthly-G.day);
  const alert=(G.cash<G.monthly&&falta<=6);
  const pendingOffers=G.st&&G.st.cargo.costo==null?1:0;
  $("hud").innerHTML=`
    <div class="hud-cell ${alert?'alert':''}">
      <div class="hud-lbl">Caja</div>
      <div class="hud-val" style="color:${G.cash<500?'var(--bad)':G.cash<2000?'var(--warn)':'var(--good)'}">${shortMoney(G.cash)}</div>
    </div>
    <div class="hud-cell ${G.rep<=-70?'alert':''}">
      <div class="hud-lbl">Reput.</div>
      <div class="hud-val" style="color:${G.rep<=-40?'var(--bad)':G.rep<0?'var(--warn)':G.rep>=40?'var(--good)':'var(--txt)'}">${G.rep>0?'+':''}${G.rep}</div>
    </div>
    <div class="hud-cell">
      <div class="hud-lbl">Dia</div>
      <div class="hud-val">${G.day}</div>
    </div>
    <div class="hud-cell click" onclick="showOpsModal()">
      <div class="hud-lbl">Ops</div>
      <div class="hud-val">${G.ops.length}/${G.capacity}</div>
      ${G.ops.length>0?'<span class="hud-badge">'+G.ops.length+'</span>':''}
    </div>
    <div class="hud-cell click" onclick="showFeedbackModal(true)">
      <div class="hud-lbl">💬</div>
      <div class="hud-val" style="font-size:11px">Opinar</div>
    </div>
  `;
}

function renderHub(){
  const c=G.st?G.st.cargo:null;
  const hasCost=c&&c.costo!=null;
  const needAgent=c&&c.costo==null&&!G.st.finished;

  // Status card
  let statusHtml="";
  if(G.over){
    statusHtml=`<div class="card center">
      <div class="big" style="color:var(--bad)">💀 Bancarrota</div>
      <div class="tip">Dia ${G.day} · Cerraste ${G.deals} · Perdiste ${G.lost}</div>
      <div class="btn-row"><button class="btn btn-primary" onclick="newGame()">🔄 Jugar de nuevo</button></div>
    </div>`;
  }else if(!G.st||G.st.finished){
    statusHtml=`<div class="card center">
      <div class="big" style="color:var(--hub)">📦</div>
      <div style="font-size:15px;font-weight:700;margin:4px 0">Nueva consulta entrante...</div>
      <div class="btn-row"><button class="btn btn-primary" onclick="newGame()">🔄 Reiniciar</button></div>
    </div>`;
  }else{
    // Active deal
    const modoIcon=modoEmoji(c.modo);
    statusHtml=`
      <div class="card">
        <div class="card-header">
          <div class="card-icon">🏢</div>
          <div>
            <div class="card-title">${c.co}</div>
            <div class="card-subtitle">${c.op} · ${c.ruta}</div>
          </div>
        </div>
        <div class="info-row" style="padding-top:0">
          <div class="info-icon">${modoIcon}</div>
          <div class="info-content">
            <div class="info-label">Carga</div>
            <div class="info-value">${c.desc} · ${c.merc}</div>
          </div>
          ${c.urgente?'<span class="badge badge-bad">⚡ Urgente</span>':''}
        </div>
        ${G.st.flavor?`<div class="note"><span class="note-icon">${G.st.flavor.slice(0,2)}</span><span>${G.st.flavor.slice(2)}</span></div>`:""}
        <div style="display:flex;gap:8px;margin-top:12px">
          <div class="duo-box" style="flex:1">
            <div class="duo-label">Tu costo</div>
            <div class="duo-value" style="color:${hasCost?'var(--info)':'var(--muted)'};font-size:18px">${hasCost?money(c.costo):'???'}</div>
          </div>
          <div class="duo-box" style="flex:1">
            <div class="duo-label">Tu precio</div>
            <div class="duo-value" style="color:${hasCost?'var(--accent)':'var(--muted)'};font-size:18px">${hasCost&&G.st.price?money(G.st.price):'???'}</div>
          </div>
        </div>
      </div>`;
  }

  // Action cards
  let actionsHtml="";
  if(!G.over&&G.st&&!G.st.finished){
    actionsHtml+=`
      <div class="section-lbl">Acciones rapidas</div>
      ${needAgent?`
        <div class="hub-action" onclick="goPanel(0)" style="border-color:var(--violet)">
          <span class="ha-icon">🚢</span>
          <div class="ha-content">
            <div class="ha-title" style="color:var(--violet)">Buscar tarifa con agentes</div>
            <div class="ha-desc">Consegui el costo mas bajo posible</div>
          </div>
          <span class="ha-arrow">→</span>
        </div>
      `:''}
      ${hasCost?`
        <div class="hub-action" onclick="goPanel(2)" style="border-color:var(--accent)">
          <span class="ha-icon">💰</span>
          <div class="ha-content">
            <div class="ha-title" style="color:var(--accent)">Cotizar al cliente</div>
            <div class="ha-desc">Arma tu cotizacion y negocia la venta</div>
          </div>
          <span class="ha-arrow">→</span>
        </div>
      `:''}
    `;
  }

  // Quick stats
  const statsHtml=`
    <div class="section-lbl">Resumen</div>
    <div class="score-grid">
      <div class="score-cell">
        <div class="score-label">Cerrados</div>
        <div class="score-value" style="color:var(--good)">${G.deals}</div>
      </div>
      <div class="score-cell">
        <div class="score-label">Perdidos</div>
        <div class="score-value" style="color:var(--bad)">${G.lost}</div>
      </div>
      <div class="score-cell">
        <div class="score-label">Problemas</div>
        <div class="score-value" style="color:var(--warn)">${G.problems}</div>
      </div>
      <div class="score-cell">
        <div class="score-label">Gastos/mes</div>
        <div class="score-value" style="color:var(--info)">${shortMoney(G.monthly)}</div>
      </div>
    </div>
  `;

  // Gestiones
  const gestionHtml=`
    <div class="section-lbl">Gestion</div>
    <div class="hub-action" onclick="showOpsModal()">
      <span class="ha-icon">📋</span>
      <div class="ha-content">
        <div class="ha-title">Operaciones en curso</div>
        <div class="ha-desc">${G.ops.length} activas · Ver detalles y avanzar tiempo</div>
      </div>
      <span class="ha-arrow">→</span>
    </div>
    <div class="hub-action" onclick="showRulesModal()">
      <span class="ha-icon">📖</span>
      <div class="ha-content">
        <div class="ha-title">Como jugar</div>
        <div class="ha-desc">Reglas, tacticas y consejos</div>
      </div>
      <span class="ha-arrow">→</span>
    </div>
  `;

  $("hub-content").innerHTML=statusHtml+actionsHtml+statsHtml+gestionHtml;
}

function renderClientes(){
  if(!G.st){$("clientes-content").innerHTML=emptyState("Esperando consulta...");return;}
  if(G.st.finished){
    // st.dealClosed lo marca closeDeal(); si no, el trato se perdió o se abandonó.
    $("clientes-content").innerHTML = G.st.dealClosed ? renderClienteCerrado() : renderClientePerdido();
    return;
  }
  if(G.st.cargo.costo==null){
    $("clientes-content").innerHTML=renderClienteConsulta();
  }else{
    $("clientes-content").innerHTML=renderClienteCotizar();
  }
}

function emptyState(msg){
  return `<div class="card center" style="margin-top:30px">
    <div style="font-size:40px;margin-bottom:8px">📦</div>
    <div style="color:var(--muted);font-size:14px">${msg}</div>
  </div>`;
}

function renderClienteConsulta(){
  const c=G.st.cargo,p=G.st.persona;
  return `<div class="card">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <span class="badge badge-info">Nueva consulta</span>
      ${c.urgente?'<span class="badge badge-bad">Urgente</span>':''}
    </div>
    <div class="card-header">
      <div class="card-icon">🏢</div>
      <div>
        <div class="card-title">${c.co}</div>
        <div class="card-subtitle">${G.rep>55?'Cliente conocido':'Cliente nuevo'} · ${c.op}</div>
      </div>
    </div>
    <div class="info-row">
      <div class="info-icon">📦</div>
      <div class="info-content"><div class="info-label">Carga</div><div class="info-value">${c.desc} · ${c.merc}</div></div>
    </div>
    <div class="info-row">
      <div class="info-icon">🌍</div>
      <div class="info-content"><div class="info-label">Ruta</div><div class="info-value">${c.ruta}</div></div>
    </div>
    <div class="info-row">
      <div class="info-icon">${modoEmoji(c.modo)}</div>
      <div class="info-content"><div class="info-label">Modo</div><div class="info-value">${c.modo}</div></div>
    </div>
    <div class="story ${c.urgente?'bad':c.merc.match(/premium|diseno|diseño|Vinos/i)?'violet':''}">${c.historia}<div class="motiv">${c.motivo}</div></div>
    ${G.st.flavor?`<div class="note"><span class="note-icon">📢</span><span>${G.st.flavor}</span></div>`:""}
    <div class="note" style="background:var(--violet-bg);border:1px solid rgba(167,139,250,0.2)">
      <span class="note-icon" style="font-size:16px">🚢</span>
      <span><b>Falta la tarifa.</b> Desliza → hacia <b>Agentes</b> para conseguir tu costo.</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-violet" onclick="goPanel(0)">🚢 Buscar tarifa →</button>
      <button class="btn btn-ghost" onclick="rejectClient()">Rechazar</button>
    </div>
  </div>`;
}

function renderClienteCotizar(){
  const st=G.st,p=st.persona,c=st.cargo;
  const costo=c.costo,floor=Math.round(costo*1.10),cap=Math.round(costo*1.55);
  if(st.price<floor)st.price=floor;
  if(st.price>cap)st.price=cap;
  const m=(st.price-costo)/costo;
  const acc=acceptance();
  const risk=estimateRisk(st);
  const w=words(acc,risk.total,m);
  const ag=agentById(c.agentId);

  return `<div class="card">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <span class="badge badge-warn">Negociando</span>
      <span style="font-size:11px;color:var(--muted)">Ronda ${st.round}/${p.maxRounds}</span>
    </div>
    <div class="card-header">
      <div class="card-icon">💰</div>
      <div>
        <div class="card-title">${c.co}</div>
        <div class="card-subtitle">${c.merc} · ${c.ruta}</div>
      </div>
    </div>

    <div class="quote-card">
      <div class="info-label">Precio de venta</div>
      <div class="quote-big">${money(st.price)}</div>
      <div class="range-wrap">
        <input type="range" min="${floor}" max="${cap}" value="${st.price}" step="25"
          oninput="G.st.price=+this.value;renderAll()">
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
        <span>Piso ${money(floor)}</span>
        <span style="color:${m<=0.12?'var(--warn)':'var(--good)'}">Margen ${Math.round(m*100)}%</span>
        <span>Max ${money(cap)}</span>
      </div>
    </div>

    <div class="duo">
      <div class="duo-box">
        <div class="duo-label">Ganancia</div>
        <div class="duo-value" style="color:var(--good)">${money(st.price-costo)}</div>
      </div>
      <div class="duo-box">
        <div class="duo-label">Cierre estimado</div>
        <div class="duo-value" style="color:${acc>0.5?'var(--good)':acc>0.3?'var(--warn)':'var(--bad)'}">${Math.round(acc*100)}%</div>
      </div>
    </div>

    <div class="section-lbl">Analisis</div>
    <div class="analysis">
      <div class="an-row"><span class="an-emoji">${w.comp[0]}</span><span><b class="an-label">${w.comp[1]}</b></span></div>
      <div class="an-row"><span class="an-emoji">${w.rk[0]}</span><span><b class="an-label">${w.rk[1]}</b><span class="an-detail"> · Agente ${c.conf}% confiable${c.prioridad?' · ⚡ prioridad':''}</span></span></div>
      <div class="an-row"><span class="an-emoji">${w.rent[0]}</span><span><b class="an-label">${w.rent[1]}</b></span></div>
    </div>

    ${st.revealed.length?`<div class="note"><span class="note-icon">💡</span><span>${st.revealed[st.revealed.length-1]}</span></div>`:""}
    <div class="note ${m<0.13||acc<0.4?'warn':''}"><span class="note-icon">💬</span><span>${advice(st,acc,risk.total,m)}</span></div>
    ${st.targetKnown?`<div class="note" style="background:var(--good-bg);border:1px solid rgba(74,222,128,0.2)"><span class="note-icon">🎯</span><span>El cliente apunta a <b>${money(st.targetKnown)}</b>. Acercate a ese número.</span></div>`
      :`<div class="btn-row" style="margin-top:4px"><button class="btn btn-ghost" onclick="askTarget()" ${st.targetAsked?'disabled':''}>${st.targetAsked?'Ya le preguntaste':'🎯 Preguntar cuánto quiere pagar'}</button></div>`}

    <div class="section-lbl">Plazo de pago</div>
    <div class="seg">${[0,15,30,45,60].map(d=>
      `<button class="seg-btn ${st.term===d?'on':''}" onclick="G.st.term=${d};renderAll()">${d===0?'Contado':d+'d'}<span class="seg-sub">${d===0?'hoy':'a '+d+'d'}</span></button>`
    ).join("")}</div>
    ${st.term>c.agentTerm?`<div class="note warn"><span class="note-icon">⏰</span><span>Cobras en ${st.term}d pero pagas al agente en ${c.agentTerm}d: usas tu caja.</span></div>`:""}

    <div class="section-lbl">Tácticas (te quedan)</div>
    <div class="tactics">
      ${tacticBtn('tiempo','useTactic',st.tactics.tiempo)}
      ${tacticBtn('valor','useTactic',st.tactics.valor)}
      ${tacticBtn('anticipo','useTactic',st.tactics.anticipo)}
    </div>

    <div class="summary">
      <div class="summary-col">
        <span class="summary-label">Cobras</span>
        <span class="summary-value" style="color:var(--good)">${money(st.price)}</span>
      </div>
      <div class="summary-op">-</div>
      <div class="summary-col">
        <span class="summary-label">Pagas</span>
        <span class="summary-value" style="color:var(--bad)">${money(costo)}</span>
      </div>
      <div class="summary-op">=</div>
      <div class="summary-col">
        <span class="summary-label">Ganas</span>
        <span class="summary-value" style="color:var(--accent)">${money(st.price-costo)}</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="sendQuote()">📨 Enviar cotizacion</button>
      <button class="btn btn-ghost" onclick="goPanel(0)">🚢 Cambiar agente</button>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-danger" onclick="declineClient()">🙇 No puedo ayudarte esta vez</button>
    </div>
  </div>`;
}

function renderClienteCerrado(){
  const st=G.st,m=(st.price-st.cargo.costo)/st.cargo.costo;
  return `<div class="card center" style="animation:cardIn 0.4s ease">
    <div style="font-size:48px;margin-bottom:8px">✅</div>
    <div class="big" style="color:var(--good)">Trato cerrado</div>
    <div style="margin:8px 0;font-size:15px;font-weight:600">${st.cargo.co}</div>
    <div class="duo">
      <div class="duo-box"><div class="duo-label">Precio</div><div class="duo-value">${money(st.price)}</div></div>
      <div class="duo-box"><div class="duo-label">Ganancia</div><div class="duo-value" style="color:var(--good)">${money(st.price-st.cargo.costo)}</div></div>
      <div class="duo-box"><div class="duo-label">Margen</div><div class="duo-value">${Math.round(m*100)}%</div></div>

    <div class="note good"><span class="note-icon">📦</span><span>Operacion en curso. Cobras en ${st.term}d. Mirala en Ops.</span></div>

  </div>`;
}

function renderClientePerdido(){
  return `<div class="card center" style="animation:cardIn 0.4s ease">
    <div style="font-size:48px;margin-bottom:8px">❌</div>
    <div class="big" style="color:var(--bad)">Trato perdido</div>
    <div class="story bad">${G.st.clientMsg}</div>
    <div class="tip">Pasar a tiempo tambien es parte del oficio.</div>
    <div class="btn-row"><button class="btn btn-primary" onclick="nextOrEnd()">Siguiente cliente →</button></div>
  </div>`;
}

function renderAgentes(){
  if(!G.st||G.over){$("agentes-content").innerHTML=emptyState("Esperando consulta...");return;}
  if(G.agentUi==="negociar"){
    $("agentes-content").innerHTML=renderAgenteNeg();
  }else{
    $("agentes-content").innerHTML=renderAgenteLista();
  }
}

function renderAgenteLista(){
  const c=G.st.cargo;
  const cards=G.st.offers.map(o=>{
    const a=agentById(o.agentId),rel=G.rel[o.agentId];
    const locked=c.agentId===o.agentId;
    const ahorro=c.marketBase-o.price;
    return `<div class="agent-card ${locked?'selected':''}">
      <div class="agent-header">
        <div class="agent-avatar">${a.emoji}</div>
        <div style="flex:1;min-width:0">
          <div class="agent-name">${a.nombre}</div>
          <div class="agent-type">${a.tipo} · ${a.desc}</div>
        </div>
        <div class="agent-rel">
          <div style="font-size:10px;color:var(--muted)">${relWord(rel)}</div>
          <div class="rel-bar"><i class="${relColorClass(rel)}" style="width:${rel}%"></i></div>
        </div>
      </div>
      <div class="agent-stats">
        <span class="agent-stat">🕒 <b>${o.transit}d</b> trans.</span>
        <span class="agent-stat">📅 <b>${o.validez}d</b> validez</span>
        <span class="agent-stat">🛡️ <b>${o.conf}%</b> conf.</span>
        <span class="agent-stat">💳 Max <b>${a.plazoMax}d</b></span>
      </div>
      <div class="agent-price-row">
        <span class="agent-price">${money(o.price)}</span>
        ${ahorro>=0?`<span class="agent-savings">🟢 Ahorras ${money(ahorro)}</span>`:`<span class="agent-loss">🔴 +${money(-ahorro)} vs mercado</span>`}
        <button class="btn btn-violet" style="padding:10px 16px;font-size:13px;flex:0 auto" onclick="openAgentNeg('${o.agentId}')">${locked?'Renegociar':'Negociar →'}</button>
      </div>
    </div>`;
  }).join("");

  return `<div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:var(--violet-bg)">🚢</div>
      <div>
        <div class="card-title" style="color:var(--violet)">Tarifas disponibles</div>
        <div class="card-subtitle">${c.co} · ${c.desc} · ${c.ruta}</div>
      </div>
    </div>
    <div class="note violet"><span class="note-icon">🎯</span><span>Cada peso que ahorras con el agente es <b>margen tuyo</b>. Pero ojo: el mas barato suele ser el menos confiable.</span></div>
    ${cards}
    ${c.costo!=null?`
      <div class="note good" style="margin-top:10px">
        <span class="note-icon">✅</span>
        <span>Tarifa reservada: <b>${money(c.costo)}</b> con ${agentById(c.agentId).nombre}. Desliza → para cotizar al cliente.</span>
      </div>
      <div class="btn-row"><button class="btn btn-primary" onclick="goPanel(2)">🏢 Ir a Clientes →</button></div>
    `:''}
  </div>`;
}

  const an=G.aneg,a=agentById(an.agentId),c=G.st.cargo;
  const ahorro=c.marketBase-an.offer;
  return `<div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:var(--violet-bg)">🤝</div>
      <div>
        <div class="card-title" style="color:var(--violet)">Negociando con ${a.nombre}</div>
        <div class="card-subtitle">${a.tipo} · Relacion: ${relWord(G.rel[an.agentId])}</div>
      </div>
    </div>
    <div class="story violet">${an.msg}</div>
    <div class="duo">
      <div class="duo-box"><div class="duo-label">Tarifa</div><div class="duo-value" style="color:var(--violet)">${money(an.offer)}</div></div>
      <div class="duo-box"><div class="duo-label">Transito</div><div class="duo-value">${an.transit}d</div></div>
      <div class="duo-box"><div class="duo-label">Conf.</div><div class="duo-value">${an.conf}%</div></div>
    </div>
    <div class="note"><span class="note-icon">${ahorro>=0?'🟢':'🔴'}</span><span>vs mercado (${money(c.marketBase)}): ${ahorro>=0?'ahorras '+money(ahorro):'pagas '+money(-ahorro)+' de mas'}</span></div>

function showOpsModal(){

  const cobrar=G.ops.reduce((s,o)=>s+o.price,0);

    const pv=o.costPaid?"agente pagado":"-"+money(o.costo)+" agente "+(Math.max(0,o.costDay-G.day)===0?"hoy":"en "+Math.max(0,o.costDay-G.day)+"d");

  d.innerHTML=`<div class="modal-box">
    <div class="modal-title">📋 Operaciones (${G.ops.length}/${G.capacity})</div>

      <div class="duo-box"><div class="duo-label">Por cobrar</div><div class="duo-value" style="color:var(--good);font-size:16px">${money(cobrar)}</div></div>
      <div class="duo-box"><div class="duo-label">Por pagar</div><div class="duo-value" style="color:var(--bad);font-size:16px">${money(pagar)}</div></div>

// ═══════════════════════════════════════════════════════════════════════
// Si hay un incidente pendiente, muestra su modal. Devuelve true si mostró uno.
function checkIncidents(){
  if(G.over || !G.incidents.length || document.getElementById('incidentModal')) return false;
  const inc=G.incidents[0];
  const d=document.createElement('div');d.className='modal';d.id='incidentModal';
  d.innerHTML=`<div class="modal-box">
    <div class="modal-title" style="color:var(--warn)">🟧 Problema en la operación</div>
    <div class="story warn">Hubo un inconveniente con la carga de <b>${inc.co}</b> (un costo extra de <b>${money(inc.extra)}</b>). El cliente está esperando que lo resuelvas. ¿Qué hacés?</div>
    <div class="hub-action" onclick="resolveIncident(true)" style="border-color:var(--good)">
      <span class="ha-icon">🤝</span>
      <div class="ha-content">
        <div class="ha-title" style="color:var(--good)">Te lo soluciono yo (absorbo el costo)</div>
        <div class="ha-desc">Pagás ${money(inc.extra)} de tu bolsillo. El cliente queda agradecido. +reputación.</div>
      </div>
    </div>
    <div class="hub-action" onclick="resolveIncident(false)" style="border-color:var(--bad)">
      <span class="ha-icon">💸</span>
      <div class="ha-content">
        <div class="ha-title" style="color:var(--bad)">No puedo hacer descuento (lo paga el cliente)</div>
        <div class="ha-desc">Te ahorrás la plata, pero el cliente se enoja. -reputación.</div>
      </div>
    </div>
  </div>`;
  document.body.appendChild(d);
  return true;
}
function resolveIncident(absorb){
  const inc=G.incidents.shift();
  const m=document.getElementById('incidentModal'); if(m) m.remove();
  G.problems++;
  if(absorb){
    // Cobrás la operación pero te comés el costo extra. Buen servicio → +reputación.
    G.cash += inc.price - inc.extra;
    addRep(1);
    if(inc.agentId) G.rel[inc.agentId]=Math.min(100,G.rel[inc.agentId]+1);
    log("🤝 Resolviste el problema de "+inc.co+" (absorbiste "+money(inc.extra)+"). (reputación +1)");
  }else{
    // No hacés descuento: cobrás todo, pero el cliente queda molesto → -reputación.
    G.cash += inc.price;
    addRep(-5);
    if(inc.agentId) G.rel[inc.agentId]=Math.max(0,G.rel[inc.agentId]-2);
    log("💸 No hiciste descuento en "+inc.co+": cobraste todo pero quedó molesto. (reputación -5)");
  }
  renderAll();
  if(!checkIncidents()) continuarFlujo();   // si hay más incidentes encola otro; si no, sigue
}
// Tras resolver incidentes/premios, completa el avance que estaba pendiente.
function continuarFlujo(){
  if(!G._needNew) return;
  if(checkTacticPrize()){ renderAll(); return; }   // si justo toca premio, mostralo antes del cliente nuevo
  G._needNew=false;
  if(G.cash<0) return gameOver();
  newClient(); goPanel(1); renderAll();
}

  d.innerHTML=`<div class="modal-box" style="padding:18px">

    <button class="modal-close" style="margin-top:10px" onclick="submitFeedback()">📤 Enviar</button>

  </div>`;
  document.body.appendChild(d);

  const stars=d.querySelectorAll('.star'),ri=d.querySelector('#fbRating');
  stars.forEach(s=>s.addEventListener('click',()=>{
    const v=+s.dataset.v;ri.value=v;
    stars.forEach((x,i)=>x.innerHTML=i<v?'★':'☆');
    stars.forEach((x,i)=>x.classList.toggle('on',i<v));
  }));
  const reset=()=>['#fbY','#fbN','#fbM'].forEach(id=>d.querySelector(id).classList.remove('on'));
  d.querySelector('#fbY').addEventListener('click',function(){reset();this.classList.add('on');d.querySelector('#fbAgain').value='Si';});
  d.querySelector('#fbN').addEventListener('click',function(){reset();this.classList.add('on');d.querySelector('#fbAgain').value='No';});

function submitFeedback(){
  const modal=document.querySelector('.modal');
  if(!modal)return;
  const name='Anonimo';   // ya no pedimos nombre
  const rating=modal.querySelector('#fbRating').value||'0';
  const again=modal.querySelector('#fbAgain').value||'Sin responder';
  const comments=modal.querySelector('#fbCom').value||'';
  const mins=Math.floor((Date.now()-G.startTime)/60000);
  const stats=`Dia ${G.day} | Cerrados ${G.deals} | Rep ${G.rep} | Caja ${shortMoney(G.cash)} | Min ${mins}`;

  const GOOGLE_SCRIPT_URL='https://script.google.com/macros/s/AKfycbyOMG6IUEs3Z5gBkU-o0oeUTqXRci83slZjvAWEvf1axCzqh-6jLIMfwIoVeYNkh8kX/exec';
  fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,rating,again,comments,stats,date:new Date().toLocaleString()})});

  alert('¡Gracias por tu feedback! Se guardo correctamente.');
  modal.remove();
}

  ["Jugar de nuevo", {t:"🔄 Otra partida", b:"Empezás una partida nueva desde el principio."}],
  ["Opinar", {t:"💬 Contarnos qué te pareció", b:"Nos dejás tu opinión del juego para que lo hagamos mejor. ¡Gracias!"}],
];
// Explicaciones para cosas que NO son botones de texto (palancas, dots, etc.)
function helpFor(el){
  // dots de navegación
  const dot=el.closest('.nav-dot');
  if(dot){ const i=dot.dataset.panel; return {t:"🔵 Cambiar de pantalla",
    b:"Tocando estos puntitos (o deslizando con el dedo) viajás entre las 3 pantallas: AGENTES (los que llevan la carga), ESCRITORIO (el resumen) y CLIENTES (los que te pagan)."}; }
  // slider de precio
  if(el.type==="range") return {t:"🎚️ La barra del precio",
    b:"Movés esta barrita para elegir cuánto le cobrás al cliente. Hacia la derecha = más caro = ganás más, pero es más difícil que te diga que sí. ¡Hay que encontrar el punto justo!"};
  // botones de plazo de pago
  if(el.closest('.seg')) return {t:"📅 Cuándo te pagan",
    b:"Elegís en cuántos días te paga el cliente. «Contado» es ya. Más días le gustan al cliente, pero vos tardás más en tener la plata. ¡Cuidado con quedarte sin plata en la mano!"};
  // tarjeta de agente
  if(el.closest('.agent-card')) return {t:"🚢 Un agente",
    b:"Esta es la oferta de un agente: su precio, cuántos días tarda, qué tan confiable es y qué tan amigo tuyo es. El más barato a veces trae más problemas. Tocá «Negociar» para hablar con él."};
  // HUD cells
  const cell=el.closest('.hud-cell');
  if(cell){ const lbl=(cell.querySelector('.hud-lbl')||{}).textContent||"";
    if(/Caja/i.test(lbl)) return {t:"💵 Tu plata",b:"Es la plata que tenés ahora mismo. Si llega a cero, perdés. ¡Cuidala!"};
    if(/Repu/i.test(lbl)) return {t:"😊 Tu fama",b:"Es qué tan bien te portás. Va de -100 a +100. Cumplí y sube; fallá y baja. Si llega a -100, nadie quiere trabajar con vos y perdés."};
    if(/Dia/i.test(lbl))  return {t:"📅 El día",b:"Te dice en qué día del juego estás. El tiempo pasa cuando atendés clientes o tocás «avanzar tiempo»."};
    if(/Ops/i.test(lbl))  return {t:"📋 Envíos en camino",b:"Cuántas cargas tenés viajando ahora. Tocá acá para ver el detalle de cada una y cuándo cobrás."};
  }
  return null;
}
function toggleHelp(){
  helpMode=!helpMode;
  document.getElementById('helpFab').classList.toggle('on',helpMode);
  document.body.classList.toggle('help-mode',helpMode);
  document.getElementById('helpBanner')?.remove();
  document.querySelector('.help-tip')?.remove();
  if(helpMode){
    const b=document.createElement('div');b.className='help-banner';b.id='helpBanner';
    b.innerHTML="🟡 MODO AYUDA: tocá cualquier botón y te explico qué hace (no va a pasar nada en el juego). Tocá el ❓ otra vez para salir.";
    document.body.appendChild(b);
  }
}
function showHelpTip(info){
  document.querySelector('.help-tip')?.remove();
  const d=document.createElement('div');d.className='help-tip';
  d.innerHTML=`<div class="ht-title">${info.t}</div><div class="ht-body">${info.b}</div>
    <button class="ht-close" onclick="this.closest('.help-tip').remove()">¡Entendí! 👍</button>`;
  document.body.appendChild(d);
}
// Interceptor en fase de CAPTURA: si el modo ayuda está activo, explica en vez de ejecutar.
document.addEventListener('click',function(e){
  if(!helpMode) return;
  if(e.target.closest('.help-fab,.help-tip,.help-banner')) return;  // estos sí funcionan normal
  const el=e.target.closest('button,input[type=range],.nav-dot,.seg,.agent-card,.hud-cell');
  if(!el) return;
  e.preventDefault(); e.stopPropagation();
  let info=helpFor(el);
  if(!info){
    const txt=(el.textContent||"").replace(/\s+/g," ").trim();
    const hit=HELP.find(([k])=>txt.includes(k));
    info = hit ? hit[1] : {t:"🔘 Este botón", b:"Tocalo (con la ayuda apagada) para usarlo. Salí del modo ayuda con el ❓ celeste."};
  }
  showHelpTip(info);
},true);

// ═══════════════════════════════════════════════════════════════════════

// Start
newGame();
showIntro();   // pantalla de bienvenida la primera vez
